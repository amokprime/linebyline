<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LineByLine</title>
<style>
:root {
  --bg: #f5f4f0; --surface: #ffffff; --border: #d8d6cf; --border-mid: #c4c2ba;
  --text: #1a1917; --text-muted: #7a7870; --text-faint: #a8a69f;
  --accent: #2c5f8a; --accent-bg: #e8f0f7; --accent-border: #a8c4dc;
  --warn-bg: #fef9e7; --warn-border: #f0d060; --warn-text: #7a5c00;
  --active-bg: #dbeafe; --active-text: #1e3a5f; --active-ts: #4a7fa8;
  --font-mono: 'Courier New', Courier, monospace; --radius: 5px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
#menu-bar { display: flex; align-items: center; height: 36px; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 8px; gap: 4px; flex-shrink: 0; }
.mb-btn { height: 26px; padding: 0 10px; border: 1px solid var(--border-mid); border-radius: var(--radius); background: transparent; color: var(--text); font-size: 12px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; }
.mb-btn:hover { background: var(--bg); }
.mb-btn.icon { width: 30px; padding: 0; justify-content: center; font-size: 15px; }
.mb-sep { width: 1px; height: 16px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
#main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
#left-panel { width: 220px; min-width: 220px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; padding: 8px; gap: 6px; overflow-y: auto; flex-shrink: 0; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 2px; }
#audio-box { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); padding: 8px; display: flex; flex-direction: column; gap: 4px; }
#song-title { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#song-artist { font-size: 11px; color: var(--text-muted); }
#progress-wrap { height: 4px; background: var(--border); border-radius: 2px; margin: 2px 0; cursor: pointer; }
#progress-fill { height: 4px; background: var(--accent); border-radius: 2px; width: 0%; pointer-events: none; }
#time-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); }
#play-row { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 2px; }
.player-btn { border: 1px solid var(--border-mid); border-radius: var(--radius); background: transparent; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; width: 34px; height: 26px; }
.player-btn:hover { background: var(--border); }
#play-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border-mid); background: transparent; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; }
#play-btn:hover { background: var(--border); }
.lrc-line.selected { background: #c7ddf5; color: var(--active-text); }
.lrc-line.selected .ts { color: var(--active-ts); }
.lrc-line.active.selected { background: var(--active-bg); }
.hk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
.hk-cell { display: flex; justify-content: space-between; align-items: center; padding: 3px 5px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-size: 11px; }
.hk-cell.mode { grid-column: span 2; background: var(--accent-bg); border-color: var(--accent-border); color: var(--active-text); }
.hk-key { font-family: var(--font-mono); font-size: 10px; background: var(--border-mid); border-radius: 3px; padding: 1px 4px; color: var(--text-muted); }
.hk-cell.mode .hk-key { background: rgba(44,95,138,0.2); color: var(--accent); }
#editor-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
#editor-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; display: flex; }
#editor-area { display: flex; min-width: 100%; height: 100%; }
.field-col { display: flex; flex-direction: column; flex: 1; min-width: 260px; border-right: 1px solid var(--border); }
.field-col:last-child { border-right: none; }
.field-header { display: flex; align-items: center; height: 34px; padding: 0 8px; gap: 4px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.field-header-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
.brace-input { width: 44px; height: 26px; font-size: 12px; font-family: var(--font-mono); text-align: center; border: 1px solid var(--border-mid); border-radius: var(--radius); background: transparent; color: var(--text); padding: 0 4px; }
.field-header-right { margin-left: auto; display: flex; gap: 4px; align-items: center; }
.fh-btn { width: 26px; height: 26px; border: 1px solid var(--border-mid); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--text); }
.fh-btn:hover { background: var(--bg); }
#merge-btn { height: 26px; padding: 0 10px; border: 1px solid var(--accent-border); border-radius: var(--radius); background: var(--accent-bg); color: var(--accent); font-size: 12px; cursor: pointer; white-space: nowrap; }
#merge-btn:hover { background: #d4e6f3; }
#merge-btn:disabled { opacity: 0.4; cursor: default; }
.warn-bar { font-size: 11px; padding: 3px 8px; background: var(--warn-bg); border-bottom: 1px solid var(--warn-border); color: var(--warn-text); display: none; flex-shrink: 0; }
.warn-bar.visible { display: block; }
.lyric-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; user-select: text; }
.lyric-area { font-family: var(--font-mono); font-size: 12px; line-height: 1.75; padding: 4px 0; min-height: 100%; }
.lrc-line { padding: 1px 8px; white-space: nowrap; cursor: pointer; }
.lrc-line:hover { background: var(--bg); }
.lrc-line.active { background: var(--active-bg); color: var(--active-text); }
.lrc-line .ts { color: var(--text-faint); margin-right: 2px; }
.lrc-line.active .ts { color: var(--active-ts); }
.lrc-line.end-ts { color: var(--text-faint); font-style: italic; }
#main-textarea { flex: 1; font-family: var(--font-mono); font-size: 12px; line-height: 1.75; padding: 4px 8px; border: none; outline: none; resize: none; background: var(--surface); color: var(--text); overflow-y: auto; white-space: pre; display: none; tab-size: 4; }
#main-textarea.visible { display: block; }
#settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
#settings-overlay.open { display: flex; }
#settings-win { width: 520px; max-height: 88vh; background: var(--surface); border: 1px solid var(--border-mid); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
#settings-title-bar { display: flex; align-items: center; height: 34px; padding: 0 12px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
#settings-title-bar span { font-size: 12px; font-weight: 600; }
#settings-close { margin-left: auto; width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border-mid); background: transparent; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }
#settings-body { overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 14px; flex: 1; }
.s-sec-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 4px; }
.s-check { display: flex; align-items: center; gap: 8px; font-size: 12px; height: 26px; cursor: pointer; }
.s-check input { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent); }
.s-row { display: flex; align-items: center; gap: 8px; height: 28px; font-size: 12px; }
.s-row label { min-width: 210px; }
.s-note { font-size: 11px; color: var(--text-faint); }
.s-num { width: 64px; height: 26px; font-size: 12px; font-family: var(--font-mono); text-align: right; padding: 0 6px; border: 1px solid var(--border-mid); border-radius: var(--radius); background: transparent; color: var(--text); }
.s-unit { font-size: 12px; color: var(--text-muted); }
.s-meta { width: 100%; height: 88px; font-size: 12px; font-family: var(--font-mono); padding: 6px 8px; line-height: 1.6; border: 1px solid var(--border-mid); border-radius: var(--radius); background: transparent; color: var(--text); resize: none; }
.hk-row { display: flex; align-items: center; gap: 8px; height: 28px; font-size: 12px; margin-bottom: 2px; }
.hk-row label { flex: 1; }
.hk-capture { width: 110px; height: 26px; font-size: 12px; font-family: var(--font-mono); text-align: center; padding: 0 6px; border: 1px solid var(--border-mid); border-radius: var(--radius); background: transparent; color: var(--text); cursor: pointer; outline: none; }
.hk-capture:focus { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
#settings-footer { display: flex; justify-content: flex-end; align-items: center; gap: 6px; height: 42px; padding: 0 14px; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
.s-btn { height: 26px; padding: 0 14px; font-size: 12px; border: 1px solid var(--border-mid); border-radius: var(--radius); background: transparent; color: var(--text); cursor: pointer; }
.s-btn:hover { background: var(--border); }
.s-btn.primary { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
.s-btn.primary:hover { background: #d4e6f3; }
#confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; }
#confirm-overlay.open { display: flex; }
#confirm-box { background: var(--surface); border: 1px solid var(--border-mid); border-radius: 8px; padding: 20px 24px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
#confirm-msg { font-size: 13px; margin-bottom: 16px; }
#confirm-btns { display: flex; justify-content: flex-end; gap: 8px; }
</style>
</head>
<body>
<div id="menu-bar">
  <button class="mb-btn" id="btn-import">+ Import</button>
  <button class="mb-btn" id="btn-export">Export</button>
  <button class="mb-btn" id="btn-new">New</button>
  <div class="mb-sep"></div>
  <button class="mb-btn icon" id="btn-undo" title="Undo (Ctrl+Z)">↩</button>
  <button class="mb-btn icon" id="btn-redo" title="Redo (Ctrl+Y)">↪</button>
  <div class="mb-sep"></div>
  <button class="mb-btn icon" id="btn-settings" title="Settings (Ctrl+,)">⚙</button>
</div>
<div id="main">
  <div id="left-panel">
    <div class="section-label">Now playing</div>
    <div id="audio-box">
      <div id="song-title">Unknown Title</div>
      <div id="song-artist">Unknown Artist</div>
      <div id="progress-wrap"><div id="progress-fill"></div></div>
      <div id="time-row"><span id="time-pos">0:00</span><span id="time-dur">0:00</span></div>
      <div id="play-row">
        <button class="player-btn" id="btn-rewind" title="Rewind to line (Q)">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="currentColor"><polygon points="9,0 1,7 9,14"/><rect x="10" y="0" width="4" height="14" rx="1.5"/></svg>
        </button>
        <button id="play-btn" title="Play/Pause (Space)">
          <svg id="play-icon" width="11" height="13" viewBox="0 0 11 13" fill="currentColor"><polygon points="1,0 11,6.5 1,13"/></svg>
          <svg id="pause-icon" width="11" height="13" viewBox="0 0 11 13" fill="currentColor" style="display:none"><rect x="0" y="0" width="4" height="13" rx="1.5"/><rect x="7" y="0" width="4" height="13" rx="1.5"/></svg>
        </button>
        <button class="player-btn" id="btn-forward" title="Forward to line (E)">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="currentColor"><rect x="4" y="0" width="4" height="14" rx="1.5"/><polygon points="9,0 17,7 9,14"/></svg>
        </button>
      </div>
    </div>
    <div class="section-label" style="margin-top:4px">Hotkeys</div>
    <div class="hk-grid" id="hk-grid"></div>
  </div>
  <div id="editor-wrapper">
    <div id="editor-scroll">
      <div id="editor-area">
        <div class="field-col" id="main-col">
          <div class="field-header">
            <span class="field-header-label">Main</span>
            <input class="brace-input" id="main-brace" placeholder="{}">
            <div class="field-header-right">
              <button class="fh-btn" id="btn-select-all" title="Select all lyric lines (excludes metadata)" style="font-size:11px;width:auto;padding:0 6px">All</button>
              <button class="fh-btn" id="btn-add-sec" title="Add secondary field (Ctrl+=)">+</button>
              <button class="fh-btn" id="btn-remove-sec" title="Remove secondary field (Ctrl+-)">−</button>
              <button id="merge-btn" disabled>Merge</button>
            </div>
          </div>
          <div class="warn-bar" id="main-warn"></div>
          <div class="lyric-scroll" id="main-scroll"><div class="lyric-area" id="main-lines"></div></div>
          <textarea id="main-textarea" spellcheck="false"></textarea>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="settings-overlay">
  <div id="settings-win">
    <div id="settings-title-bar"><span>Settings</span><button id="settings-close">✕</button></div>
    <div id="settings-body">
      <div>
        <div class="s-sec-label">Auto-strip from lyrics on import</div>
        <label class="s-check"><input type="checkbox" id="s-strip-headers"> Headers</label>
        <label class="s-check"><input type="checkbox" id="s-strip-meta"> Metadata</label>
      </div>
      <div>
        <div class="s-sec-label">Intervals</div>
        <div class="s-row"><label>Seek interval</label><input class="s-num" id="s-seek" type="number" value="1000"><span class="s-unit">ms</span></div>
        <div class="s-row"><label>Tiny timestamp interval</label><input class="s-num" value="100" disabled style="opacity:0.5"><span class="s-unit">ms</span><span class="s-note" style="margin-left:4px">(fixed)</span></div>
        <div class="s-row"><label>Small timestamp interval</label><input class="s-num" id="s-small" type="number" value="200"><span class="s-unit">ms</span></div>
        <div class="s-row"><label>Medium timestamp interval</label><input class="s-num" id="s-medium" type="number" value="400"><span class="s-unit">ms</span></div>
        <div class="s-row"><label>Large timestamp interval</label><input class="s-num" id="s-large" type="number" value="1000"><span class="s-unit">ms</span></div>
      </div>
      <div>
        <div class="s-sec-label">Default metadata tags</div>
        <textarea class="s-meta" id="s-default-meta"></textarea>
      </div>
      <div>
        <div class="s-sec-label">Hotkeys</div>
        <div id="hk-settings-rows"></div>
      </div>
    </div>
    <div id="settings-footer">
      <button class="s-btn" id="s-cancel">Cancel</button>
      <button class="s-btn primary" id="s-save">Save</button>
    </div>
  </div>
</div>
<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-msg"></div>
    <div id="confirm-btns">
      <button class="s-btn" id="confirm-no">Cancel</button>
      <button class="s-btn primary" id="confirm-yes">OK</button>
    </div>
  </div>
</div>
<input type="file" id="file-picker" multiple accept="audio/*,.lrc,.txt" style="display:none">
<script>
'use strict';
const DEFAULT_META = '[ti: Unknown]\n[ar: Unknown]\n[al: Unknown]\n[re: Genius, GeniusLyricsCopier, LineByLine]\n[by: contributor'+Math.floor(1000+Math.random()*9000)+']\n\n';
const DEFAULT_CFG = {
  seek_ms:1000, large_ms:1000, medium_ms:400, small_ms:200,
  strip_headers:false, strip_metadata:false, default_meta:DEFAULT_META,
  hotkeys:{
    toggle_mode:'Tab', play_pause:'Space', sync:'W', end_line:'R',
    rewind:'Q', forward:'E',
    ts_back_tiny:'Z', ts_fwd_tiny:'V',
    ts_back_small:'A', ts_fwd_small:'F',
    ts_back_medium:'S', ts_fwd_medium:'D',
    ts_back_large:'X', ts_fwd_large:'C',
    add_field:'Ctrl+=', remove_field:'Ctrl+-',
    import:'Ctrl+O', export:'Ctrl+P', new:'Ctrl+N', settings:'Ctrl+,',
    undo:'Ctrl+Z', redo:'Ctrl+Y',
  }
};
const HK_LABELS = {
  toggle_mode:'Toggle mode', play_pause:'Play / pause',
  sync:'Sync line', end_line:'End line',
  rewind:'Rewind to line', forward:'Forward to line',
  ts_back_tiny:'Rewind timestamp by a tiny interval',
  ts_fwd_tiny:'Forward timestamp by a tiny interval',
  ts_back_small:'Rewind timestamp by a small interval',
  ts_fwd_small:'Forward timestamp by a small interval',
  ts_back_medium:'Rewind timestamp by a medium interval',
  ts_fwd_medium:'Forward timestamp by a medium interval',
  ts_back_large:'Rewind timestamp by a large interval',
  ts_fwd_large:'Forward timestamp by a large interval',
  add_field:'Add secondary field', remove_field:'Remove secondary field',
  import:'Import', export:'Export', new:'New file',
  settings:'Settings', undo:'Undo', redo:'Redo',
};
function loadCfg(){
  try{
    const s=localStorage.getItem('lbl_cfg');
    if(!s)return JSON.parse(JSON.stringify(DEFAULT_CFG));
    const d=JSON.parse(s),c=JSON.parse(JSON.stringify(DEFAULT_CFG));
    Object.assign(c,d);c.hotkeys=Object.assign({},DEFAULT_CFG.hotkeys,d.hotkeys||{});return c;
  }catch(e){return JSON.parse(JSON.stringify(DEFAULT_CFG));}
}
function saveCfg(){localStorage.setItem('lbl_cfg',JSON.stringify(cfg));}
let cfg=loadCfg();
let hotkeyMode=true,playing=false,audioEl=null,secondaryCols=[],undoStack=[],redoStack=[],suppressScrollSync=false,activeLine=-1,selectedLines=new Set();

function loadAutosave(){
  try{
    const s=localStorage.getItem('lbl_autosave');
    if(s){const d=JSON.parse(s);_setTA(d.main||cfg.default_meta);}
    else _setTA(cfg.default_meta);
  }catch(e){_setTA(cfg.default_meta);}
  renderMainLines();checkLineCounts();updateTitleFromText();
}
function doAutosave(){localStorage.setItem('lbl_autosave',JSON.stringify({main:getTA()}));}
function getTA(){return document.getElementById('main-textarea').value;}
function _setTA(t){document.getElementById('main-textarea').value=t;}

// setMainText pushes undo and refreshes everything
function setMainText(t,pushU=true){
  if(pushU)pushUndo(getTA());
  _setTA(t);renderMainLines();checkLineCounts();updateTitleFromText();doAutosave();
}
function pushUndo(prev){undoStack.push(prev);if(undoStack.length>200)undoStack.shift();redoStack=[];}
function doUndo(){if(!undoStack.length)return;redoStack.push(getTA());_setTA(undoStack.pop());renderMainLines();checkLineCounts();updateTitleFromText();doAutosave();}
function doRedo(){if(!redoStack.length)return;undoStack.push(getTA());_setTA(redoStack.pop());renderMainLines();checkLineCounts();updateTitleFromText();doAutosave();}

// Mode: hotkey=rendered view, typing=textarea
function applyMode(){
  const scroll=document.getElementById('main-scroll'),ta=document.getElementById('main-textarea');
  if(hotkeyMode){
    // Sync textarea edits back before switching
    renderMainLines();
    // Restore scroll: find the line visible in textarea and scroll rendered view to match
    const lineHeight=parseFloat(getComputedStyle(ta).lineHeight)||20.25;
    const topLine=Math.floor(ta.scrollTop/lineHeight);
    scroll.style.display='';ta.classList.remove('visible');
    // Scroll rendered view to same approximate position
    const lines=document.querySelectorAll('#main-lines .lrc-line');
    if(lines[topLine])lines[topLine].scrollIntoView({block:'start'});
  } else {
    // Save scroll ratio from rendered view
    const ratio=scroll.scrollHeight>scroll.clientHeight?scroll.scrollTop/(scroll.scrollHeight-scroll.clientHeight):0;
    scroll.style.display='none';ta.classList.add('visible');
    // Restore scroll in textarea
    ta.scrollTop=ratio*(ta.scrollHeight-ta.clientHeight);
    ta.focus();
  }
  rebuildHkPanel();
}

// Textarea input handler (typing mode)
document.getElementById('main-textarea').addEventListener('input',()=>{
  renderMainLines();checkLineCounts();updateTitleFromText();doAutosave();
});

// Paste into rendered view (hotkey mode) - append after existing content
document.getElementById('main-lines').addEventListener('paste',e=>{
  e.preventDefault();
  const text=e.clipboardData.getData('text/plain');
  if(!text)return;
  const existing=getTA().trimEnd();
  const imported=text.trimStart();
  setMainText(existing+'\n'+imported);
});

// TS helpers
const TS_RE=/^\[(\d{2}):(\d{2})\.(\d{2})\]/,META_RE=/^\[[a-zA-Z]+:/;
function tsToMs(l){const m=TS_RE.exec(l);if(!m)return null;return +m[1]*60000+ +m[2]*1000+ +m[3]*10;}
function msToTs(ms){ms=Math.max(0,ms);const min=Math.floor(ms/60000),sec=Math.floor((ms%60000)/1000),cent=Math.floor((ms%1000)/10);return`[${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${String(cent).padStart(2,'0')}]`;}
function isEndTs(l){return TS_RE.test(l)&&l.replace(TS_RE,'').trim()==='';}
function isHeader(l){return l.startsWith('[')&&!META_RE.test(l)&&!TS_RE.test(l);}
function replaceTs(l,ms){return TS_RE.test(l)?msToTs(ms)+l.slice(10):msToTs(ms)+' '+l;}

function renderMainLines(){
  const lines=getTA().split('\n'),container=document.getElementById('main-lines');
  container.innerHTML='';
  lines.forEach((line,i)=>{
    const div=document.createElement('div');
    div.className='lrc-line';div.dataset.idx=i;
    if(isEndTs(line))div.classList.add('end-ts');
    if(i===activeLine)div.classList.add('active');
    if(selectedLines.has(i))div.classList.add('selected');
    const ms=tsToMs(line);
    if(ms!==null){
      const ts=document.createElement('span');ts.className='ts';ts.textContent=line.slice(0,10);div.appendChild(ts);
      const rest=document.createElement('span');rest.textContent=line.slice(10);div.appendChild(rest);
    } else if(line.trim()===''){
      div.innerHTML='&nbsp;';div.style.cursor='default';
    } else {div.textContent=line;}
    div.addEventListener('click',()=>onLineClick(i));
    div.addEventListener('contextmenu',e=>{e.preventDefault();onLineRightClick(i,e.shiftKey);});
    container.appendChild(div);
  });
}
function onLineClick(idx){
  selectedLines.clear();
  activeLine=idx;
  const ms=tsToMs(getTA().split('\n')[idx]);
  if(ms!==null&&audioEl){
    audioEl.currentTime=Math.max(0,ms-cfg.seek_ms)/1000;
    if(!playing){audioEl.play();playing=true;updatePlayBtn();}
  }
  renderMainLines();scrollToActive();
}
// Right-click: toggle line in selection (Shift+right-click = range select to activeLine)
let lastRightClicked=-1;
function onLineRightClick(idx,isShift){
  if(isShift&&lastRightClicked>=0){
    const lo=Math.min(lastRightClicked,idx),hi=Math.max(lastRightClicked,idx);
    for(let i=lo;i<=hi;i++)selectedLines.add(i);
  } else {
    if(selectedLines.has(idx))selectedLines.delete(idx);
    else selectedLines.add(idx);
    lastRightClicked=idx;
  }
  renderMainLines();
}
function selectAllLyricLines(){
  selectedLines.clear();
  getTA().split('\n').forEach((l,i)=>{if(!META_RE.test(l)&&l.trim()!=='')selectedLines.add(i);});
  renderMainLines();
}
function scrollToActive(){const el=document.querySelector('#main-lines .lrc-line.active');if(el)el.scrollIntoView({block:'nearest'});}

// Audio
function setupAudio(file){
  if(audioEl){audioEl.pause();audioEl.src='';}
  audioEl=new Audio();audioEl.src=URL.createObjectURL(file);
  audioEl.addEventListener('timeupdate',onTimeUpdate);
  audioEl.addEventListener('ended',()=>{playing=false;updatePlayBtn();});
  audioEl.addEventListener('loadedmetadata',()=>{document.getElementById('time-dur').textContent=fmtTime(audioEl.duration);});
  document.getElementById('song-title').textContent=file.name.replace(/\.[^.]+$/,'')||'Unknown Title';
}
function onTimeUpdate(){
  const pos=audioEl.currentTime,dur=audioEl.duration||0;
  document.getElementById('time-pos').textContent=fmtTime(pos);
  document.getElementById('progress-fill').style.width=dur?(pos/dur*100)+'%':'0%';
  updateActiveLineFromTime(pos*1000);
}
function updateActiveLineFromTime(posMs){
  const lines=getTA().split('\n');let best=-1;
  for(let i=0;i<lines.length;i++){const ms=tsToMs(lines[i]);if(ms!==null&&ms<=posMs)best=i;}
  if(best!==activeLine){activeLine=best;renderMainLines();scrollToActive();syncSecScroll();}
}
function fmtTime(s){s=Math.floor(s);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function togglePlay(){if(!audioEl)return;if(playing){audioEl.pause();playing=false;}else{audioEl.play();playing=true;}updatePlayBtn();}
function updatePlayBtn(){document.getElementById('play-icon').style.display=playing?'none':'';document.getElementById('pause-icon').style.display=playing?'':'none';}
function currentMs(){return audioEl?audioEl.currentTime*1000:0;}
function autoPlay(){if(audioEl&&!playing){audioEl.play();playing=true;updatePlayBtn();}}
function seekRewind(){
  if(!audioEl)return;const lines=getTA().split('\n');
  for(let i=activeLine;i>=0;i--){const ms=tsToMs(lines[i]);if(ms!==null){audioEl.currentTime=Math.max(0,ms-cfg.seek_ms)/1000;autoPlay();return;}}
}
function seekForward(){
  if(!audioEl)return;const lines=getTA().split('\n');
  for(let i=activeLine+1;i<lines.length;i++){const ms=tsToMs(lines[i]);if(ms!==null){audioEl.currentTime=Math.max(0,ms-cfg.seek_ms)/1000;autoPlay();return;}}
}
document.getElementById('progress-wrap').addEventListener('click',e=>{
  if(!audioEl||!audioEl.duration)return;
  const r=e.currentTarget.getBoundingClientRect();audioEl.currentTime=((e.clientX-r.left)/r.width)*audioEl.duration;
});

// Sync/timestamp
function syncLine(){
  const ms=currentMs(),lines=getTA().split('\n');
  if(activeLine<0||activeLine>=lines.length)return;
  lines[activeLine]=replaceTs(lines[activeLine],ms);setMainText(lines.join('\n'));
}
function insertEndLine(){
  const ms=currentMs(),lines=getTA().split('\n');
  const idx=activeLine>=0?activeLine+1:lines.length;
  lines.splice(idx,0,msToTs(ms));setMainText(lines.join('\n'));
  activeLine=idx;renderMainLines();scrollToActive();
}
function adjustTs(delta){
  const lines=getTA().split('\n');
  const targets=selectedLines.size>0?[...selectedLines]:[activeLine];
  let changed=false;
  targets.forEach(i=>{
    if(i<0||i>=lines.length)return;
    const ms=tsToMs(lines[i]);if(ms===null)return;
    lines[i]=replaceTs(lines[i],ms+delta);changed=true;
  });
  if(changed)setMainText(lines.join('\n'));
}

// Secondary fields
function addSecondary(){
  const idx=secondaryCols.length+1,col=document.createElement('div');col.className='field-col';
  const hdr=document.createElement('div');hdr.className='field-header';
  const lbl=document.createElement('span');lbl.className='field-header-label';lbl.textContent=`Secondary ${idx}`;
  const bi=document.createElement('input');bi.className='brace-input';bi.placeholder='{}';bi.style.marginLeft='auto';
  bi.addEventListener('input',()=>autoBrace(bi));
  hdr.appendChild(lbl);hdr.appendChild(bi);col.appendChild(hdr);
  const wb=document.createElement('div');wb.className='warn-bar';col.appendChild(wb);
  const scrollEl=document.createElement('div');scrollEl.className='lyric-scroll';
  const le=document.createElement('div');le.className='lyric-area';le.contentEditable='true';le.spellcheck=false;le.style.outline='none';le.style.userSelect='text';
  le.addEventListener('input',()=>{checkLineCounts();updateMergeBtn();});
  le.addEventListener('paste',e=>{e.preventDefault();document.execCommand('insertText',false,e.clipboardData.getData('text/plain'));});
  scrollEl.appendChild(le);col.appendChild(scrollEl);
  scrollEl.addEventListener('scroll',()=>syncScrollFrom(scrollEl));
  document.getElementById('editor-area').appendChild(col);
  secondaryCols.push({col,scrollEl,linesEl:le,braceInput:bi,warnBar:wb});
  checkLineCounts();updateMergeBtn();
}
function removeSecondary(){if(!secondaryCols.length)return;const{col}=secondaryCols.pop();col.remove();checkLineCounts();updateMergeBtn();}
function autoBrace(inp){const p={'(':')',  '[':']','{':'}','<':'>'};const v=inp.value;if(v.length===1&&p[v])inp.value=v+p[v];}
function getSecLines(le){return le.innerText.split('\n').filter(l=>l.trim());}
function syncScrollFrom(src){
  if(suppressScrollSync)return;suppressScrollSync=true;
  const h=src.scrollHeight-src.clientHeight,ratio=h>0?src.scrollTop/h:0;
  [document.getElementById('main-scroll'),...secondaryCols.map(c=>c.scrollEl)].filter(el=>el!==src).forEach(el=>{el.scrollTop=ratio*(el.scrollHeight-el.clientHeight);});
  suppressScrollSync=false;
}
function syncSecScroll(){syncScrollFrom(document.getElementById('main-scroll'));}
document.getElementById('main-scroll').addEventListener('scroll',function(){syncScrollFrom(this);});

function getMainContentLines(){return getTA().split('\n').filter(l=>l.trim());}
function checkLineCounts(){
  const n=getMainContentLines().length;
  secondaryCols.forEach(({linesEl,warnBar})=>{
    const sn=getSecLines(linesEl).length;
    if(sn&&sn!==n){warnBar.textContent=`\u26a0 Line count mismatch (${sn} vs ${n})`;warnBar.classList.add('visible');}
    else warnBar.classList.remove('visible');
  });
}
function updateMergeBtn(){
  const n=getMainContentLines().length;
  const ok=secondaryCols.some(c=>getSecLines(c.linesEl).length>0)&&secondaryCols.every(c=>{const sn=getSecLines(c.linesEl).length;return sn===0||sn===n;});
  document.getElementById('merge-btn').disabled=!ok;
}
function mergeTranslations(){
  const mainLines=getTA().split('\n');
  const tsLines=mainLines.map((l,i)=>[i,tsToMs(l)]).filter(([,ms])=>ms!==null);
  if(!tsLines.length){alert('No timestamps in main field.');return;}
  const secData=secondaryCols.map(({linesEl,braceInput})=>({lines:getSecLines(linesEl),brace:braceInput.value.trim()})).filter(d=>d.lines.length>0);
  if(!secData.length)return;
  const lastLine=mainLines[tsLines[tsLines.length-1][0]];
  if(!isEndTs(lastLine)&&!confirm('No trailing end timestamp found. Final secondary lines may not display correctly. Continue?'))return;
  const contentTs=tsLines.filter(([i])=>!isEndTs(mainLines[i]));
  const result=[...mainLines];
  for(let ci=contentTs.length-1;ci>=0;ci--){
    const[lineIdx]=contentTs[ci];
    let nextMs=null;for(const[i,ms]of tsLines){if(i>lineIdx){nextMs=ms;break;}}
    if(nextMs===null)continue;
    const ins=[];
    secData.forEach(({lines,brace})=>{
      if(ci<lines.length){const t=lines[ci];ins.push(brace.length>=2?brace[0]+t+brace[1]:brace.length===1?brace+t:t);}
    });
    const n=ins.length;
    result.splice(lineIdx+1,0,...ins.map((t,j)=>`${msToTs(nextMs-(n-j)*10)} ${t}`));
  }
  setMainText(result.join('\n'));
}

// Title from text
function updateTitleFromText(){
  const text=getTA();
  const ti=(text.match(/^\[ti:\s*(.+)\]/m)||[])[1],ar=(text.match(/^\[ar:\s*(.+)\]/m)||[])[1],al=(text.match(/^\[al:\s*(.+)\]/m)||[])[1];
  const parts=[ti,al,ar].map(s=>s&&s.trim()).filter(s=>s&&s!=='Unknown');
  document.getElementById('title-meta').textContent=parts.join(' \u2014 ');
  document.getElementById('song-title').textContent=(ti&&ti.trim()&&ti.trim()!=='Unknown')?ti.trim():'Unknown Title';
  document.getElementById('song-artist').textContent=(ar&&ar.trim()&&ar.trim()!=='Unknown')?ar.trim():'Unknown Artist';
}

// Import
document.getElementById('btn-import').addEventListener('click',()=>{document.getElementById('file-picker').value='';document.getElementById('file-picker').click();});
document.getElementById('file-picker').addEventListener('change',e=>{
  const files=Array.from(e.target.files);if(!files.length)return;
  const audioExts=/\.(mp3|flac|ogg|wav|m4a|aac|opus)$/i,lrcExts=/\.(lrc|txt)$/i;
  const af=files.find(f=>audioExts.test(f.name)),lf=files.find(f=>lrcExts.test(f.name));
  if(af)setupAudio(af);
  if(lf){
    const reader=new FileReader();
    reader.onload=ev=>{
      let lines=ev.target.result.split('\n');
      if(cfg.strip_headers)lines=lines.filter(l=>!isHeader(l));
      if(cfg.strip_metadata)lines=lines.filter(l=>!META_RE.test(l));
      const existing=getTA().trimEnd(),imported=lines.join('\n').trimStart();
      setMainText(existing+'\n'+imported);
    };
    reader.readAsText(lf,'utf-8');
  }
});

// Export
document.getElementById('btn-export').addEventListener('click',doExport);
function doExport(){
  const text=getTA(),ti=text.match(/^\[ti:\s*(.+)\]/m),raw=ti?ti[1].trim():'';
  const fname=(raw&&raw!=='Unknown'?raw:'lyrics')+'.lrc';
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));a.download=fname;a.click();
}

// New
document.getElementById('btn-new').addEventListener('click',()=>{
  confirm2('Clear all fields and start over?',()=>{
    setMainText(cfg.default_meta,false);undoStack=[];redoStack=[];
    secondaryCols.slice().reverse().forEach(()=>removeSecondary());
    if(audioEl){audioEl.pause();audioEl.src='';audioEl=null;}
    playing=false;updatePlayBtn();activeLine=-1;
    document.getElementById('song-title').textContent='Unknown Title';
    document.getElementById('song-artist').textContent='Unknown Artist';
    document.getElementById('title-meta').textContent='';
    document.getElementById('time-pos').textContent='0:00';
    document.getElementById('time-dur').textContent='0:00';
    document.getElementById('progress-fill').style.width='0%';
  });
});

// Hotkey panel
function rebuildHkPanel(){
  const grid=document.getElementById('hk-grid');grid.innerHTML='';
  const hk=cfg.hotkeys,{large_ms:lg,medium_ms:med,small_ms:sm}=cfg;
  [['toggle_mode',hotkeyMode?'Hotkey mode':'Typing mode',true],['play_pause','Play/pause',false],
   ['sync','Sync line',false],['rewind','Rewind',false],['end_line','End line',false],
   ['forward','Forward',false],
   ['ts_back_tiny','−100ms',false],['ts_fwd_tiny','+100ms',false],
   ['ts_back_small',`−${sm}ms`,false],['ts_fwd_small',`+${sm}ms`,false],
   ['ts_back_medium',`−${med}ms`,false],['ts_fwd_medium',`+${med}ms`,false],
   ['ts_back_large',`−${lg}ms`,false],['ts_fwd_large',`+${lg}ms`,false],
  ].forEach(([key,label,isMode])=>{
    const cell=document.createElement('div');cell.className='hk-cell'+(isMode?' mode':'');
    if(isMode)cell.style.gridColumn='span 2';
    cell.innerHTML=`<span>${label}</span><span class="hk-key">${hk[key]}</span>`;
    grid.appendChild(cell);
  });
}

// Settings
function openSettings(){
  document.getElementById('s-strip-headers').checked=cfg.strip_headers;
  document.getElementById('s-strip-meta').checked=cfg.strip_metadata;
  document.getElementById('s-seek').value=cfg.seek_ms;
  document.getElementById('s-small').value=cfg.small_ms;
  document.getElementById('s-medium').value=cfg.medium_ms;
  document.getElementById('s-large').value=cfg.large_ms;
  document.getElementById('s-default-meta').value=cfg.default_meta;
  buildHkRows();document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('open');}
function buildHkRows(){
  const c=document.getElementById('hk-settings-rows');c.innerHTML='';
  Object.entries(HK_LABELS).forEach(([key,label])=>{
    const row=document.createElement('div');row.className='hk-row';
    const lbl=document.createElement('label');lbl.textContent=label;
    const inp=document.createElement('input');inp.className='hk-capture';inp.dataset.hkKey=key;inp.value=cfg.hotkeys[key]||'';inp.readOnly=true;
    inp.addEventListener('focus',()=>{inp.value='';});
    inp.addEventListener('keydown',e=>{
      e.preventDefault();const parts=[];
      if(e.ctrlKey)parts.push('Ctrl');if(e.shiftKey)parts.push('Shift');if(e.altKey)parts.push('Alt');
      const k=e.key;if(!['Control','Shift','Alt','Meta'].includes(k))parts.push(k===' '?'Space':k.length===1?k.toUpperCase():k);
      if(parts.length)inp.value=parts.join('+');
    });
    row.appendChild(lbl);row.appendChild(inp);c.appendChild(row);
  });
}
document.getElementById('s-save').addEventListener('click',()=>{
  cfg.strip_headers=document.getElementById('s-strip-headers').checked;
  cfg.strip_metadata=document.getElementById('s-strip-meta').checked;
  cfg.seek_ms=+document.getElementById('s-seek').value||1000;
  cfg.small_ms=+document.getElementById('s-small').value||200;
  cfg.medium_ms=+document.getElementById('s-medium').value||400;
  cfg.large_ms=+document.getElementById('s-large').value||1000;
  cfg.default_meta=document.getElementById('s-default-meta').value;
  document.querySelectorAll('.hk-capture').forEach(inp=>{if(inp.value)cfg.hotkeys[inp.dataset.hkKey]=inp.value;});
  saveCfg();rebuildHkPanel();closeSettings();
});
document.getElementById('s-cancel').addEventListener('click',closeSettings);
document.getElementById('settings-close').addEventListener('click',closeSettings);
document.getElementById('btn-settings').addEventListener('click',openSettings);

// Confirm
function confirm2(msg,onYes){
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-overlay').classList.add('open');
  document.getElementById('confirm-yes').onclick=()=>{document.getElementById('confirm-overlay').classList.remove('open');onYes();};
  document.getElementById('confirm-no').onclick=()=>{document.getElementById('confirm-overlay').classList.remove('open');};
}

// Keyboard
function keyStr(e){
  const p=[];if(e.ctrlKey)p.push('Ctrl');if(e.shiftKey)p.push('Shift');if(e.altKey)p.push('Alt');
  const k=e.key;if(!['Control','Shift','Alt','Meta'].includes(k))p.push(k===' '?'Space':k.length===1?k.toUpperCase():k);
  return p.join('+');
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('settings-overlay').classList.contains('open'))return;
  const ks=keyStr(e),hk=cfg.hotkeys;
  if(ks===hk.import){e.preventDefault();document.getElementById('btn-import').click();return;}
  if(ks===hk.export){e.preventDefault();doExport();return;}
  if(ks===hk.new){e.preventDefault();document.getElementById('btn-new').click();return;}
  if(ks===hk.settings){e.preventDefault();openSettings();return;}
  if(ks===hk.undo){e.preventDefault();doUndo();return;}
  if(ks===hk.redo){e.preventDefault();doRedo();return;}
  if(ks===hk.add_field){e.preventDefault();addSecondary();return;}
  if(ks===hk.remove_field){e.preventDefault();removeSecondary();return;}
  if(ks===hk.toggle_mode){e.preventDefault();hotkeyMode=!hotkeyMode;applyMode();return;}
  if(!hotkeyMode)return;

  // Arrow key selection in hotkey mode
  const lineCount=getTA().split('\n').length;
  if(e.key==='ArrowUp'||e.key==='ArrowDown'){
    const dir=e.key==='ArrowUp'?-1:1;
    const next=Math.max(0,Math.min(lineCount-1,(activeLine<0?0:activeLine)+dir));
    if(e.shiftKey){
      // Shift+Arrow: extend selection from activeLine toward next
      if(selectedLines.size===0&&activeLine>=0)selectedLines.add(activeLine);
      selectedLines.add(next);
      activeLine=next;
    } else if(e.ctrlKey){
      // Ctrl+Arrow: move active line without affecting selection
      activeLine=next;
    } else {
      // Plain arrow: move active and clear selection
      selectedLines.clear();activeLine=next;
    }
    e.preventDefault();renderMainLines();scrollToActive();return;
  }
  const actions={
    [hk.play_pause]:()=>togglePlay(),[hk.sync]:()=>syncLine(),[hk.end_line]:()=>insertEndLine(),
    [hk.rewind]:()=>seekRewind(),[hk.forward]:()=>seekForward(),
    [hk.ts_back_tiny]:()=>adjustTs(-100),[hk.ts_fwd_tiny]:()=>adjustTs(100),
    [hk.ts_back_small]:()=>adjustTs(-cfg.small_ms),[hk.ts_fwd_small]:()=>adjustTs(cfg.small_ms),
    [hk.ts_back_medium]:()=>adjustTs(-cfg.medium_ms),[hk.ts_fwd_medium]:()=>adjustTs(cfg.medium_ms),
    [hk.ts_back_large]:()=>adjustTs(-cfg.large_ms),[hk.ts_fwd_large]:()=>adjustTs(cfg.large_ms),
  };
  if(actions[ks]){e.preventDefault();actions[ks]();}
});

// Buttons
document.getElementById('btn-undo').addEventListener('click',doUndo);
document.getElementById('btn-redo').addEventListener('click',doRedo);
document.getElementById('btn-rewind').addEventListener('click',seekRewind);
document.getElementById('btn-forward').addEventListener('click',seekForward);
document.getElementById('play-btn').addEventListener('click',togglePlay);
document.getElementById('btn-add-sec').addEventListener('click',addSecondary);
document.getElementById('btn-remove-sec').addEventListener('click',removeSecondary);
document.getElementById('merge-btn').addEventListener('click',mergeTranslations);
document.getElementById('btn-select-all').addEventListener('click',selectAllLyricLines);

// Init
loadAutosave();rebuildHkPanel();applyMode();
</script>
