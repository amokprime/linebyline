<style>
/* ── Themes ── */
:root{
  --bg:#f6f8fa;--surface:#ffffff;--border:#d0d7de;--border-mid:#b8bec6;
  --text:#24292f;--text-muted:#656d76;--text-faint:#9198a1;
  --accent:#0969da;--accent-bg:#ddf4ff;--accent-border:#54aeff;
  --warn-bg:#fff8c5;--warn-border:#d4a72c;--warn-text:#7d4e00;
  --active-bg:#ddf4ff;--active-text:#0550ae;--active-ts:#0969da;
  --font-mono:ui-monospace,monospace;--radius:6px;
  --editor-font:system-ui,sans-serif;--editor-size:13.2px;
}
[data-theme="dark"]{
  --bg:#161b22;--surface:#0d1117;--border:#30363d;--border-mid:#484f58;
  --text:#e6edf3;--text-muted:#848d97;--text-faint:#6e7681;
  --accent:#58a6ff;--accent-bg:#121d2f;--accent-border:#1f6feb;
  --warn-bg:#2d2207;--warn-border:#9e6a03;--warn-text:#e3b341;
  --active-bg:#121d2f;--active-text:#58a6ff;--active-ts:#79c0ff;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14.3px;}
body{font-family:system-ui,sans-serif;font-size:1rem;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
#menu-bar{display:flex;align-items:center;height:39.6px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 8.8px;gap:4.4px;flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;}
.mb-btn{height:28.6px;padding:0 11px;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;color:var(--text);font-size:13.2px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;flex-shrink:0;}
.mb-btn:hover{background:var(--bg);}
.mb-btn:active{filter:brightness(0.88);transform:translateY(1px);}
.mb-btn.icon{width:33px;padding:0;justify-content:center;font-size:16.5px;}
.mb-btn.accent{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border);}
.mb-btn.accent:hover{filter:brightness(0.95);}
.mb-btn.accent:disabled{opacity:0.4;cursor:default;background:transparent;color:var(--text-muted);border-color:var(--border-mid);}
.mb-btn:disabled{opacity:0.4;cursor:default;}
.mb-sep{width:1px;height:17.6px;background:var(--border);margin:0 2.2px;flex-shrink:0;}
#font-select{height:28.6px;font-size:12px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--surface);color:var(--text);padding:0 6px;cursor:pointer;}
#font-size-wrap{display:flex;align-items:center;position:relative;}
#font-size-inp{width:30px;height:28.6px;font-size:12px;font-family:inherit;text-align:center;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;color:var(--text);-moz-appearance:textfield;}
#font-size-inp::-webkit-inner-spin-button,#font-size-inp::-webkit-outer-spin-button{-webkit-appearance:none;}
.fs-spinner{display:flex;flex-direction:column;width:16px;height:28.6px;border:1px solid var(--border-mid);border-radius:var(--radius);overflow:hidden;background:transparent;flex-shrink:0;}
.fs-tick{flex:1;border:none;border-radius:0;background:transparent;cursor:pointer;color:var(--text);font-size:9px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
.fs-tick:first-child{border-bottom:1px solid var(--border-mid);}
.fs-tick:hover{background:var(--border);}
.fs-tick:active{filter:brightness(0.88);}
#btn-theme,#btn-settings,#btn-import,#btn-save,#btn-help,#btn-issues{height:28.6px;width:33px;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;cursor:pointer;color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;}
#btn-theme:hover,#btn-settings:hover,#btn-import:hover,#btn-save:hover,#btn-help:hover,#btn-issues:hover{background:var(--bg);}
#btn-theme:active,#btn-settings:active,#btn-import:active,#btn-save:active,#btn-help:active,#btn-issues:active{filter:brightness(0.88);transform:translateY(1px);}
#main{display:flex;flex:1;overflow:hidden;min-height:0;}
#left-panel{width:310px;min-width:310px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;padding:8.8px;gap:6.6px;overflow-y:auto;flex-shrink:0;}
.section-label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:2px;}
#audio-box{border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);padding:8.8px;display:flex;flex-direction:column;gap:4.4px;}
#song-title{font-size:13.2px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#song-artist{font-size:12px;color:var(--text-muted);}
#progress-wrap{height:4.4px;background:var(--border);border-radius:2px;margin:2px 0;cursor:pointer;}
#progress-fill{height:4.4px;background:var(--accent);border-radius:2px;width:0%;pointer-events:none;}
#time-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);}
#seek-row{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-muted);margin-top:2px;}
#seek-offset{width:52px;height:24.2px;font-size:12px;font-family:inherit;text-align:right;padding:0 4px;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;color:var(--text);-moz-appearance:textfield;}
#seek-offset::-webkit-inner-spin-button,#seek-offset::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.seek-arr{width:22px;height:24.2px;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;cursor:pointer;color:var(--text);font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
.seek-arr:hover{background:var(--border);}
.seek-arr:active{filter:brightness(0.82);transform:translateY(1px);}
#media-row{display:flex;align-items:center;gap:5px;margin-bottom:2px;}
#speed-val{width:39px;height:24.2px;font-size:12px;font-family:inherit;text-align:right;padding:0 4px;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;color:var(--text);-moz-appearance:textfield;}
#speed-val::-webkit-inner-spin-button,#speed-val::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
#vol-row{display:flex;align-items:center;gap:6px;margin-top:2px;}
.media-btn{display:flex;align-items:center;justify-content:center;width:34px;height:28px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text);cursor:pointer;padding:0;}
.media-btn:hover{background:var(--border);}
.media-btn:active{filter:brightness(0.88);transform:translateY(1px);}
#vol-mute-btn{width:24px;height:24px;border:none;background:transparent;cursor:pointer;color:var(--text-muted);padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#vol-mute-btn:hover{color:var(--text);}
#vol-mute-btn:active{transform:scale(0.88);}
#vol-slider{flex:1;accent-color:var(--accent);cursor:pointer;height:4px;}
#vol-pct{font-size:11px;color:var(--text-faint);min-width:32px;text-align:right;}
.om-btn{width:100%;height:24.2px;font-size:11.5px;border:1px solid var(--accent-border);border-radius:var(--radius);cursor:pointer;font-weight:600;}
.om-btn.om-ts{background:var(--accent-bg);color:var(--accent);}
.om-btn.om-seek{background:var(--warn-bg);color:var(--warn-text);border-color:var(--warn-border);}
.om-btn:hover{filter:brightness(0.95);}
#sync-file-btn{height:24.2px;font-size:11px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--bg);cursor:pointer;color:var(--text);white-space:nowrap;padding:0 6px;display:inline-flex;align-items:center;gap:5px;}
#sync-file-btn:hover{background:var(--border);}
#sync-file-btn:active{filter:brightness(0.85);transform:translateY(1px);}
#sync-file-btn .hk-key{font-size:10px;}
#sync-file-hk{display:none;}
.lrc-line.selected{background:var(--accent-bg);color:var(--active-text);outline:1px solid var(--accent-border);outline-offset:-1px;}
.lrc-line.selected .ts{color:var(--active-ts);}
.lrc-line.active.selected{background:var(--active-bg);}
.hk-grid{display:grid;grid-template-columns:1fr 1fr;gap:3.3px;}
.hk-cell{display:flex;justify-content:space-between;align-items:center;padding:3.3px 5.5px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);font-size:12px;cursor:pointer;}
.hk-cell:hover{background:var(--border-mid);}
.hk-cell:active{filter:brightness(0.85);transform:translateY(1px);}
.hk-cell.mode{grid-column:span 2;background:var(--accent-bg);border-color:var(--accent-border);color:var(--active-text);cursor:pointer;}
.hk-cell.mode.half{grid-column:span 1;}
.hk-cell.mode:hover{filter:brightness(0.95);}
.hk-cell.mode:active{filter:brightness(0.85);transform:translateY(1px);}
.hk-key{font-family:var(--font-mono);font-size:11px;background:var(--border-mid);border-radius:3px;padding:1px 4px;color:var(--text-muted);}
.hk-cell.mode .hk-key{background:rgba(9,105,218,0.15);color:var(--accent);}
[data-theme="dark"] .hk-cell.mode .hk-key{background:rgba(88,166,255,0.15);}
#editor-wrapper{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#editor-scroll{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;}
#editor-area{display:flex;min-width:100%;height:100%;}
.field-col{display:flex;flex-direction:column;flex:1;min-width:286px;border-right:1px solid var(--border);}
.field-col:last-child{border-right:none;}
.field-header{display:flex;align-items:center;height:37.4px;padding:0 8.8px;gap:4.4px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;justify-content:space-between;}
.field-header-label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:0.04em;text-transform:uppercase;}
.fh-btn{height:28.6px;padding:0 8.8px;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;cursor:pointer;font-size:13.2px;display:flex;align-items:center;justify-content:center;color:var(--text);white-space:nowrap;}
.fh-btn:hover{background:var(--bg);}
.fh-btn:active{filter:brightness(0.88);transform:translateY(1px);}
.warn-bar{font-size:12px;padding:3.3px 8.8px;background:var(--warn-bg);border-bottom:1px solid var(--warn-border);color:var(--warn-text);display:none;flex-shrink:0;}
.warn-bar.visible{display:block;}
.lyric-scroll{flex:1;overflow-y:auto;overflow-x:hidden;user-select:text;}
.lyric-area{font-family:var(--editor-font);font-size:var(--editor-size);line-height:1.75;padding:4.4px 0;min-height:100%;}
.lrc-line{padding:1px 8.8px;white-space:nowrap;cursor:pointer;}
.lrc-line:hover{background:var(--bg);}
@keyframes line-flash{0%{background:var(--accent);color:#fff;}100%{background:var(--active-bg);color:var(--active-text);}}
.lrc-line.active{background:var(--active-bg);color:var(--active-text);font-weight:600;}
.lrc-line.active.flash{animation:line-flash 0.35s ease-out forwards;}
.lrc-line .ts{color:var(--text-faint);margin-right:2px;}
.lrc-line.active .ts{color:var(--active-ts);}
.lrc-line.end-ts{color:var(--text-faint);font-style:italic;}
#main-textarea{flex:1;font-family:var(--editor-font);font-size:var(--editor-size);line-height:1.75;padding:4.4px 8.8px;border:none;outline:none;resize:none;background:var(--surface);color:var(--text);overflow-y:auto;white-space:pre;display:none;tab-size:4;}
#main-textarea.visible{display:block;}
.sec-textarea{flex:1;font-family:var(--editor-font);font-size:var(--editor-size);line-height:1.75;padding:4.4px 8.8px;border:none;outline:none;resize:none;background:var(--surface);color:var(--text);overflow-y:auto;white-space:pre;tab-size:4;min-height:0;}
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;align-items:center;justify-content:center;}
#settings-overlay.open{display:flex;}
#settings-win{width:480px;max-height:88vh;background:var(--surface);border:1px solid var(--border-mid);border-radius:8.8px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.22);}
#settings-title-bar{display:flex;align-items:center;height:37.4px;padding:0 13.2px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
#settings-title-bar span{font-size:13.2px;font-weight:600;flex-shrink:0;}
#settings-close{width:24.2px;height:24.2px;border-radius:50%;border:1px solid var(--border-mid);background:transparent;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#s-search-wrap{display:flex;align-items:center;margin-left:auto;gap:4px;position:relative;}
#s-search{width:160px;height:26px;font-size:12px;font-family:inherit;padding:0 28px 0 8px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none;transition:border-color 0.15s,width 0.15s;}
#s-search:focus{border-color:var(--accent);}
#s-search.hk-mode{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
#s-search-kbd{position:absolute;right:5px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:3px;border:1px solid var(--border-mid);background:var(--surface);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);padding:0;flex-shrink:0;}
#s-search-kbd:hover{background:var(--border);color:var(--text);}
#s-search-kbd.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}
.s-hidden{display:none!important;}
.s-sub-label.s-hidden+.hk-row,.s-sub-label.s-all-hidden{display:none!important;}
#settings-body{overflow-y:auto;padding:15.4px;display:flex;flex-direction:column;gap:15.4px;flex:1;}
.s-sec-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--border);padding-bottom:4.4px;margin-bottom:4.4px;}
.s-sub-label{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin:10px 0 4px 0;}
.s-check{display:flex;align-items:center;gap:8.8px;font-size:13.2px;height:28.6px;cursor:pointer;}
.s-check input{width:15.4px;height:15.4px;cursor:pointer;accent-color:var(--accent);}
.s-row{display:flex;align-items:center;gap:8.8px;height:30.8px;font-size:13.2px;}
.s-row label{min-width:160px;}
.s-num{width:70.4px;height:28.6px;font-size:13.2px;font-family:inherit;text-align:right;padding:0 6.6px;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;color:var(--text);}
.s-unit{font-size:13.2px;color:var(--text-muted);}
.s-meta{width:100%;height:96.8px;font-size:13.2px;font-family:inherit;padding:6.6px 8.8px;line-height:1.6;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;color:var(--text);resize:none;}
/* Hotkey row layout: [clear] [label] [capture] [replace] [reset] */
.hk-row{display:flex;align-items:center;gap:6px;min-height:30.8px;font-size:13.2px;margin-bottom:2.2px;flex-wrap:nowrap;}
.hk-row.hk-conflict{min-height:auto;flex-wrap:wrap;padding-bottom:4px;}
.hk-row.hk-conflict label{flex-basis:100%;order:-1;}
.hk-row label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hk-clear{width:22px;height:22px;border-radius:50%;border:1px solid var(--border-mid);background:transparent;cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-muted);padding:0;line-height:1;}
.hk-clear.visible{display:flex;}
.hk-clear:hover{background:var(--bg);color:var(--text);}
.hk-clear:active{filter:brightness(0.88);}
.hk-capture{width:110px;height:28.6px;font-size:13.2px;font-family:inherit;text-align:center;padding:0 6.6px;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;color:var(--text);cursor:pointer;outline:none;caret-color:transparent;flex-shrink:0;}
.hk-capture::placeholder{color:var(--text-muted);}
.hk-capture:focus{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.hk-reset{height:28.6px;padding:0 8px;font-size:11px;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;color:var(--text-muted);cursor:pointer;white-space:nowrap;display:none;flex-shrink:0;}
.hk-reset.visible{display:inline-flex;align-items:center;}
.hk-reset:hover{background:var(--bg);color:var(--text);}
.hk-reset:active{filter:brightness(0.88);}
.hk-replace{height:28.6px;padding:0 8px;font-size:11px;border:1px solid var(--warn-border);border-radius:var(--radius);background:var(--warn-bg);color:var(--warn-text);cursor:pointer;white-space:nowrap;display:none;flex-shrink:0;}
.hk-replace.visible{display:inline-flex;align-items:center;}
.hk-replace:hover{filter:brightness(0.95);}
.hk-replace:active{filter:brightness(0.88);}
#settings-conflict{display:none;font-size:12px;color:var(--warn-text);margin-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hk-restrict-warn{font-size:11px;color:#c0392b;display:none;margin-left:4px;white-space:nowrap;}
.hk-restrict-warn.visible{display:inline;}
#settings-footer{display:flex;justify-content:flex-start;align-items:center;gap:6.6px;height:46.2px;padding:0 15.4px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.s-btn{height:28.6px;padding:0 15.4px;font-size:13.2px;border:1px solid var(--border-mid);border-radius:var(--radius);background:transparent;color:var(--text);cursor:pointer;}
.s-btn:hover{background:var(--border);}
.s-btn:active{filter:brightness(0.85);transform:translateY(1px);}
.s-btn.primary{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border);}
.s-btn.primary:hover{filter:brightness(0.95);}

</style>

// ── Config ───────────────────────────────────────────────────────────────────

// ── Restricted hotkey rules ──────────────────────────────────────────────────
// Keys blocked for ALL remappable hotkeys (browser-reserved or destructive)
const RESTRICTED_ALL=new Set([
  'MouseLeft','MouseRight',
  'Escape',
  // Ctrl combos browsers reserve
  'Ctrl+R','Ctrl+F','Ctrl+Q','Ctrl+W','Ctrl+L',
  'Ctrl+T','Ctrl+N','Ctrl+P','Ctrl+H','Ctrl+J','Ctrl+U',
  'Ctrl+B','Ctrl+G',
  'Ctrl+Z','Ctrl+Y','Ctrl+X','Ctrl+C','Ctrl+V','Ctrl+E','Ctrl+K',

  'Ctrl+Shift+O','Ctrl+Shift+P','Ctrl+Shift+T','Ctrl+Shift+W','Ctrl+Shift+Delete',

  'Meta+A','Meta+B','Meta+C','Meta+D','Meta+E','Meta+F','Meta+G','Meta+H','Meta+I','Meta+J',

  'Meta+Left','Meta+Right','Meta+Up','Meta+Down',
  'Meta+Shift+I','Meta+Shift+J','Meta+Shift+C',
  // All Alt combos (fingerprinting-resistant browsers remap many; blanket block)
  'Alt+A','Alt+B','Alt+C','Alt+D','Alt+E','Alt+F','Alt+G','Alt+H','Alt+I','Alt+J',
  'Alt+K','Alt+L','Alt+M','Alt+N','Alt+O','Alt+P','Alt+Q','Alt+R','Alt+S','Alt+T',
  'Alt+U','Alt+V','Alt+W','Alt+X','Alt+Y','Alt+Z',

  'Alt+Left','Alt+Right','Alt+Up','Alt+Down',
  // Navigation / system keys
  'Home','End','Insert','Delete','Backspace',
  'NumLock','ScrollLock','Meta','PrintScreen','ContextMenu',
  // All F-keys
  'F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12',
]);

// Keys that only allow non-alphanumeric/Space (for toggle_mode and offset_mode_toggle)
const ALPHA_NUM_SPACE_RE=/^(([A-Z]|[0-9]|Space)$|Shift\+[A-Z0-9]$)/;

function isRestrictedForAll(ks){
  if(RESTRICTED_ALL.has(ks))return`"${ks}" is reserved by the browser`;
  return null;
}
function isRestrictedForKey(ks,key){
  const allMsg=isRestrictedForAll(ks);
  if(allMsg)return allMsg;
  if(ks==='Ctrl+;'&&key!=='save')return'Ctrl+; is reserved for Save';
  if(ks==='Ctrl+O'&&key!=='open')return'Ctrl+O is reserved for Open';
  if(ks==='Ctrl+,'&&key!=='settings')return'Ctrl+, is reserved for Settings';
  if(ks==='Ctrl+.'&&key!=='theme_toggle')return'Ctrl+. is reserved for Toggle theme';
  if(ks==='Ctrl+/'&&key!=='help')return'Ctrl+/ is reserved for Help';
  if(ks==="Ctrl+'"&&key!=='issues')return"Ctrl+' is reserved for Issues";
  if(ks==='Ctrl+ArrowLeft'&&key!=='mark_translation')return'Ctrl+ArrowLeft is reserved for Mark line as translation';
  if((key==='toggle_mode'||key==='offset_mode_toggle')&&ALPHA_NUM_SPACE_RE.test(ks)){
    return'Letters, numbers, and Space are not allowed for this action';
  }
  return null;
}

function loadCfg(){
  try{
    const s=localStorage.getItem('lbl_cfg');
    if(!s)return JSON.parse(JSON.stringify(DEFAULT_CFG));
    const d=JSON.parse(s),c=JSON.parse(JSON.stringify(DEFAULT_CFG));
    Object.assign(c,d);c.hotkeys=Object.assign({},DEFAULT_CFG.hotkeys,d.hotkeys||{});
    if(c.hotkeys.open==='Ctrl+M')c.hotkeys.open='Ctrl+O';
    if(d.hotkeys&&d.hotkeys.end_line==='R'&&!d.hotkeys.replay_only)c.hotkeys.end_line='T';
    if(!c.hotkeys.replay_only)c.hotkeys.replay_only='R';
    if(d.speed_increment!==undefined&&d.speed_ratio===undefined)c.speed_ratio=1.10;
    // Migrate old hotkeys to new defaults
    if(d.hotkeys){
      if(d.hotkeys.seek_back==='Alt+Q')c.hotkeys.seek_back='Ctrl+A';
      if(d.hotkeys.seek_fwd==='Alt+W')c.hotkeys.seek_fwd='Ctrl+D';
      if(d.hotkeys.save==='Ctrl+S')c.hotkeys.save='Ctrl+;';
      if(d.hotkeys.settings==='Alt+`')c.hotkeys.settings='Ctrl+,';
      if(d.hotkeys.help==='F2')c.hotkeys.help='Ctrl+/';
      if(d.hotkeys.speed_down==='Alt+1')c.hotkeys.speed_down='Ctrl+1';
      if(d.hotkeys.speed_up==='Alt+2')c.hotkeys.speed_up='Ctrl+2';
      if(d.hotkeys.speed_reset==='Alt+3')c.hotkeys.speed_reset='Ctrl+3';
      if(d.hotkeys.add_field==='Ctrl+1')c.hotkeys.add_field='Ctrl+4';
      if(d.hotkeys.remove_field==='Ctrl+2')c.hotkeys.remove_field='Ctrl+5';
      if(d.hotkeys.merge_fields==='Ctrl+3')c.hotkeys.merge_fields='Ctrl+6';
    }
    if(!c.hotkeys.theme_toggle)c.hotkeys.theme_toggle='Ctrl+.';
    if(!c.hotkeys.replay_end)c.hotkeys.replay_end='Shift+R';
    if(!c.hotkeys.mark_translation)c.hotkeys.mark_translation='Ctrl+ArrowLeft';
    if(!c.hotkeys.issues)c.hotkeys.issues="Ctrl+'";
    // Remove deprecated mute hotkey
    if(c.hotkeys.mute)delete c.hotkeys.mute;
    return c;
  }catch(e){return JSON.parse(JSON.stringify(DEFAULT_CFG));}
}

// ── State ────────────────────────────────────────────────────────────────────
let hotkeyMode=true,offsetSeekMode=false,playing=false,audioEl=null,secondaryCols=[];

if(isNaN(masterVolume)||masterVolume<0||masterVolume>1)masterVolume=1;

function loadAutosave(){
  try{
    const s=sessionStorage.getItem('lbl_autosave');
    if(s){
      const d=JSON.parse(s);
      _setTA(d.main||cfg.default_meta);
      if(d.mergeDone)mergeDone=d.mergeDone;
      if(d.audioPath)savedAudioPath=d.audioPath;
      if(d.poolTexts&&d.poolTexts.length){
        for(let i=0;i<d.poolTexts.length;i++){addSecondary();}
        d.poolTexts.forEach((txt,i)=>{if(secondaryPool[i])secondaryPool[i].linesEl.value=txt;});
        const vis=d.visibleCount||0;
        for(let i=vis;i<secondaryPool.length;i++){
          secondaryPool[i].col.style.display='none';
          if(secondaryCols[secondaryCols.length-1]===secondaryPool[i])secondaryCols.pop();
        }

    }else{_setTA(cfg.default_meta);}
  }catch(e){_setTA(cfg.default_meta);}
  renderMainLines();checkLineCounts();updateTitleFromText();
  if(activeLine<0){
    const lines=getTA().split('\n');
    for(let i=0;i<lines.length;i++){
      if(!META_RE.test(lines[i])&&lines[i].trim()!==''){activeLine=i;break;}
    }
  }
  undoStack=[takeSnapshot()];redoStack=[];
}
function doAutosave(audioPath){
  const d={main:getTA(),poolTexts:secondaryPool.map(c=>c.linesEl.value),visibleCount:secondaryCols.length,mergeDone:mergeDone};
  if(audioPath!==undefined)savedAudioPath=audioPath;
  if(savedAudioPath)d.audioPath=savedAudioPath;
  sessionStorage.setItem('lbl_autosave',JSON.stringify(d));
}
function getTA(){return document.getElementById('main-textarea').value;}
function _setTA(t){document.getElementById('main-textarea').value=t;}

// ── Snapshot-based undo/redo ─────────────────────────────────────────────────
function takeSnapshot(){
  return{main:getTA(),secondaries:secondaryCols.map(c=>c.linesEl.value),mergeDone:mergeDone};
}
function applySnapshot(snap){
  _setTA(snap.main);
  snap.secondaries.forEach((txt,i)=>{if(secondaryCols[i])secondaryCols[i].linesEl.value=txt;});
  mergeDone=snap.mergeDone;
  renderMainLines();checkLineCounts();updateTitleFromText();doAutosave();updateMergeBtn();
}
function pushSnapshot(){
  const snap=takeSnapshot();
  undoStack.push(snap);if(undoStack.length>100)undoStack.shift();redoStack=[];doAutosave();
}
function doUndo(){if(undoStack.length<2)return;redoStack.push(undoStack.pop());applySnapshot(undoStack[undoStack.length-1]);}
function doRedo(){if(!redoStack.length)return;undoStack.push(redoStack.pop());applySnapshot(undoStack[undoStack.length-1]);}
function setMainText(t){pushSnapshot();_setTA(t);renderMainLines();checkLineCounts();updateTitleFromText();doAutosave();}

// ── Mode switching ───────────────────────────────────────────────────────────
function applyMode(){

  if(hotkeyMode){
    const lineH=ta.scrollHeight/Math.max(1,getTA().split('\n').length);

    });
  }else{

    for(let i=0;i<taLines.length;i++){
      if(META_RE.test(taLines[i])||taLines[i].trim()===''){charCount+=taLines[i].length+1;continue;}
      firstLyricChar=charCount;break;
    }
    const scroll_h=document.getElementById('main-scroll').scrollHeight-document.getElementById('main-scroll').clientHeight;
    const ratio=scroll_h>0?document.getElementById('main-scroll').scrollTop/scroll_h:0;
    scroll.style.display='none';ta.classList.add('visible');
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      ta.setSelectionRange(firstLyricChar,firstLyricChar);
      if(ratio>0.01){const ta_h=ta.scrollHeight-ta.clientHeight;ta.scrollTop=ratio*ta_h;}
      else{ta.scrollTop=0;}
      ta.focus();
    }));
  }
  rebuildHkPanel();
}

// ── Helpers ──────────────────────────────────────────────────────────────────
// ── LRC parsing utilities ──────────────────────────────────────────────────
const TS_RE=/^\[(\d{2}):(\d{2})\.(\d{2})\]/,META_RE=/^\[[a-zA-Z]+:/;
function tsToMs(l){const m=TS_RE.exec(l);if(!m)return null;return +m[1]*60000+ +m[2]*1000+ +m[3]*10;}
function msToTs(ms){ms=Math.max(0,ms);const min=Math.floor(ms/60000),sec=Math.floor((ms%60000)/1000),cent=Math.floor((ms%1000)/10);return`[${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${String(cent).padStart(2,'0')}]`;}
function isEndTs(l){return TS_RE.test(l)&&l.replace(TS_RE,'').trim()==='';}
function isHeader(l){return l.startsWith('[')&&!META_RE.test(l)&&!TS_RE.test(l);}
function replaceTs(l,ms){return TS_RE.test(l)?msToTs(ms)+l.slice(10):msToTs(ms)+' '+l;}
function getSeekOffset(){return parseInt(document.getElementById('seek-offset').value)||0;}
function stripSecLine(l){return l.replace(TS_RE,'').replace(/^ /,'');}
function maybeAppendTrailingTs(){
  // Only add if audio loaded (to know duration) and no trailing ts already exists
  if(!audioEl||!audioEl.duration)return;
  if(hasTrailingTimestamp())return;
  const durMs=Math.floor(audioEl.duration*1000);
  const ts=msToTs(durMs);
  setMainText(getTA().trimEnd()+'\n'+ts);
}
// ── Paste and metadata cleaning ────────────────────────────────────────────
function cleanPaste(text,context){
  // Always strip sections on paste; never strip metadata; never strip on lrc import
  let lines=text.split('\n');
  if(context==='paste')lines=lines.filter(l=>!isHeader(l));
  return lines.join('\n');
}

// Append ", LineByLine" to [re:] tag if not already present
function ensureLineByLineInRe(text){
  return text.replace(/^(\[re:\s*)(.*?)(\]\s*)$/m,(match,pre,val,post)=>{
    if(/LineByLine/i.test(val))return match;
    return pre+(val.trim()?val.trim()+', LineByLine':'LineByLine')+post;
  });
}

function mergeLrcMeta(lrcText){
  const defaultLines=cfg.default_meta.split('\n');
  const lrcLines=lrcText.split('\n');
  const lrcMeta={};
  lrcLines.forEach(l=>{
    const m=l.match(/^\[([a-zA-Z]+):\s*(.*)\]$/);
    if(m)lrcMeta[m[1].toLowerCase()]=m[2].trim();
  });
  const merged=defaultLines.map(l=>{
    const m=l.match(/^\[([a-zA-Z]+):\s*(.*)\]$/);
    if(!m)return l;
    const key=m[1].toLowerCase();
    const lrcVal=lrcMeta[key];
    if(lrcVal!==undefined&&lrcVal!=='')return`[${m[1]}: ${lrcVal}]`;
    return l;
  });
  const extraFields=[];
  lrcLines.forEach(l=>{
    const m=l.match(/^\[([a-zA-Z]+):\s*(.*)\]$/);
    if(!m)return;
    const key=m[1].toLowerCase();
    if(!defaultLines.some(dl=>dl.match(/^\[([a-zA-Z]+):/)?.[1]?.toLowerCase()===key)){
      extraFields.push(l);
    }
  });
  if(extraFields.length){
    let lastMetaIdx=-1;
    for(let i=0;i<merged.length;i++){if(merged[i]&&merged[i].match(/^\[[a-zA-Z]+:/))lastMetaIdx=i;}
    merged.splice(lastMetaIdx+1,0,...extraFields);
  }
  let result=merged.filter(l=>l!==undefined).join('\n');
  result=ensureLineByLineInRe(result);
  return result;
}

// ── Genius extraction ──────────────────────────────────────────────────────
function cleanGenius(text){
  const lines=text.split('\n');
  const hasLyricsHeading=lines.some(l=>/Lyrics$/.test(l.trim()));
  const hasGenius=lines.some(l=>/Genius\.com|genius\.com|ML Genius|Genius is the/.test(l));
  const hasReadMore=lines.some(l=>/Read More\s*$/.test(l.trim()));
  if(!hasLyricsHeading&&!hasGenius&&!hasReadMore)return null;
  let start=-1;
  for(let i=0;i<lines.length;i++){
    if(/Read More\s*$/.test(lines[i].trim())){start=i+1;break;}
  }
  if(start<0){
    for(let i=0;i<lines.length;i++){
      if(/^\[[^\]]+\]/.test(lines[i].trim())&&!META_RE.test(lines[i])){start=i;break;}
    }
  }
  if(start<0)return null;
  let end=lines.length;
  for(let i=start;i<lines.length;i++){
    const t=lines[i].trim();
    if(t==='About'||t==='Song Bio'||/^© \d{4}/.test(t)||t==='Sign Up And Drop Knowledge 🤓'){end=i;break;}
    if(t==='Credits'&&i>start+5){end=i;break;}
  }
  let lyricLines=lines.slice(start,end);
  const preFiltered=[];let inYmal=false;
  for(let i=0;i<lyricLines.length;i++){
    const t=lyricLines[i].trim();
    if(t==='You might also like'){
      if(preFiltered.length&&preFiltered[preFiltered.length-1].trim()!=='')preFiltered.push('');
      inYmal=true;continue;
    }
    if(inYmal){
      if(t===''||(/^\[[^\]]+\]$/.test(t)&&!TS_RE.test(t))){inYmal=false;}
      else{continue;}
    }
    preFiltered.push(lyricLines[i]);
  }
  lyricLines=preFiltered;
  lyricLines=lyricLines.filter(l=>{
    const t=l.trim();
    if(/^\[[^\]]+\]$/.test(t)&&!TS_RE.test(t))return false;
    if(/^\[.{2,50}\]$/.test(t)&&!TS_RE.test(t))return false;
    return true;
  });
  const result=[];let blanks=0;
  for(const l of lyricLines){
    if(l.trim()===''){blanks++;if(blanks<=1)result.push(l);}
    else{blanks=0;result.push(l);}
  }
  const out=result.join('\n').trim();
  if(!out)return null;
  return cleanPaste(out,'paste');
}

function markGeniusSource(){
  if(_geniusDetectedThisSession)return;
  _geniusDetectedThisSession=true;
  let updated=getTA().replace(/^\[re:.*\]/m,'[re: Genius, LineByLine]');
  // Ensure LineByLine is in the re tag after replacement
  updated=ensureLineByLineInRe(updated);
  if(updated!==getTA()){_setTA(updated);renderMainLines();updateTitleFromText();}
}
function extractGeniusMeta(raw){
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  let title='',artist='',album='';
  const head=lines.slice(0,40);
  for(let i=0;i<head.length;i++){
    const m=head[i].match(/^Cover art for .+ by (.+)$/i);
    if(m){artist=m[1].trim();break;}
  }
  for(let i=0;i<head.length;i++){
    if(/\s+Lyrics$/.test(head[i])){
      title=head[i].replace(/\s+Lyrics$/,'').trim();
      if(!artist){
        for(let j=i+1;j<Math.min(i+5,head.length);j++){
          if(/^Producer$/i.test(head[j]))break;
          if(head[j]&&head[j].length<60){artist=head[j];break;}
        }
      }
      break;
    }
  }
  for(let i=0;i<head.length-1;i++){
    if(/^Track\s+\d+\s+(on|[-–])/i.test(head[i])){album=head[i+1].trim();break;}
  }
  let text=getTA();
  function replaceIfDefault(tag,val){
    if(!val)return;
    text=text.replace(new RegExp('^\\['+tag+':\\s*(.*)\\]','m'),(m,cur)=>{
      const c=cur.trim();
      return(c===''||c.toLowerCase()==='unknown')?`[${tag}: ${val}]`:m;
    });
  }
  replaceIfDefault('ti',title);replaceIfDefault('ar',artist);replaceIfDefault('al',album);
  if(text!==getTA()){_setTA(text);renderMainLines();updateTitleFromText();}
}

// ── Render / line UI ───────────────────────────────────────────────────────
function renderMainLines(){
  const lines=getTA().split('\n'),container=document.getElementById('main-lines');
  container.innerHTML='';
  lines.forEach((line,i)=>{
    if(hotkeyMode&&(META_RE.test(line)))return;
    if(hotkeyMode&&line.trim()===''){
      const prev=lines[i-1];
      if(prev===undefined||META_RE.test(prev))return;
    }
    const div=document.createElement('div');
    div.className='lrc-line';div.dataset.idx=i;
    if(isEndTs(line))div.classList.add('end-ts');
    if(i===activeLine)div.classList.add('active');
    if(selectedLines.has(i))div.classList.add('selected');
    const ms=tsToMs(line);
    if(ms!==null){
      const ts=document.createElement('span');ts.className='ts';ts.textContent=line.slice(0,10);div.appendChild(ts);
      const rest=document.createElement('span');rest.textContent=line.slice(10);div.appendChild(rest);
    }else if(line.trim()===''){
      div.innerHTML='&nbsp;';div.style.cursor='default';
    }else{div.textContent=line;}
    div.addEventListener('mousedown',e=>{
      if(e.button===0){
        e.preventDefault();
        if(e.shiftKey&&activeLine>=0){
          const lo=Math.min(activeLine,i),hi=Math.max(activeLine,i);
          for(let j=lo;j<=hi;j++){if(!META_RE.test(lines[j]))selectedLines.add(j);}
          activeLine=i;renderMainLines();
        }else if(e.ctrlKey){
          if(selectedLines.has(i))selectedLines.delete(i);else selectedLines.add(i);
          activeLine=i;renderMainLines();
        }else{
          selectedLines.clear();activeLine=i;
          const ms=tsToMs(line);
          if(ms!==null&&audioEl){
            const isCurrentLine=(i===lastPlayingLine);
            if(isCurrentLine){
              if(cfg.replay_resume_current){audioEl.currentTime=Math.max(0,ms+getSeekOffset())/1000;}
            }else{
              if(cfg.replay_play_other){audioEl.currentTime=Math.max(0,ms+getSeekOffset())/1000;}
              else{audioEl.currentTime=ms/1000;}
            }
            if(!playing){
              try{audioEl.muted=masterMuted;audioEl.volume=masterVolume;}catch(_){}
              audioEl.play();playing=true;lastPlayingLine=i;updatePlayBtn();
            }
          }else if(!ms){
            suppressAutoLine=true;
            clearTimeout(arrowNavTimer);
            arrowNavTimer=setTimeout(()=>{suppressAutoLine=false;},1500);
          }
          renderMainLines();scrollToActive();
        }
      }
    });
    div.addEventListener('contextmenu',e=>e.preventDefault());
    container.appendChild(div);
  });
}

function scrollToActive(){const el=document.querySelector('#main-lines .lrc-line.active');if(el)el.scrollIntoView({block:'nearest'});}


document.getElementById('main-lines').addEventListener('paste',e=>{
  e.preventDefault();
  const raw=e.clipboardData.getData('text/plain');if(!raw)return;
  const geniusCleaned=cleanGenius(raw);
  const cleaned=geniusCleaned||cleanPaste(raw,'paste');
  const cleanedTrimmed=cleaned.split('\n').map(l=>l.trimEnd()).join('\n');
  const existing=getTA().trimEnd();
  setMainText(existing+'\n\n'+cleanedTrimmed.trimStart());

    }

});

// ── Audio ────────────────────────────────────────────────────────────────────
function applyVolume(){
  document.getElementById('vol-slider').value=masterVolume;
  document.getElementById('vol-pct').textContent=Math.round(masterVolume*100)+'%';
  updateMuteIcon();

}
function updateMuteIcon(){
  const muted=masterMuted||masterVolume===0;
  document.getElementById('vol-icon').style.display=muted?'none':'';
  document.getElementById('mute-icon').style.display=muted?'':'none';
}
function setupAudio(file,pathHint){
  if(audioEl){audioEl.pause();audioEl.src='';}
  audioEl=new Audio();audioEl.src=URL.createObjectURL(file);
  audioEl.volume=masterVolume;audioEl.muted=masterMuted;
  audioEl.addEventListener('timeupdate',onTimeUpdate);
  audioEl.addEventListener('ended',()=>{playing=false;updatePlayBtn();});
  audioEl.addEventListener('loadedmetadata',()=>{document.getElementById('time-dur').textContent=fmtTime(audioEl.duration);});
  audioEl.addEventListener('volumechange',()=>{
    // Sync mute icon when browser tab mute (Ctrl+M) changes audioEl.muted externally
    if(audioEl.muted!==masterMuted){masterMuted=audioEl.muted;updateMuteIcon();localStorage.setItem('lbl_muted',masterMuted?'1':'0');}
  });
  currentSpeed=1.0;if(audioEl)audioEl.playbackRate=1.0;document.getElementById('speed-val').value='1';
  const stem=file.name.replace(/\.[^.]+$/,'')||'Unknown Title';
  document.getElementById('song-title').textContent=stem;
  lastImportStem=stem;
  // Only overwrite [ti:] if it's blank or still the unknown placeholder
  const updated=getTA().replace(/^\[ti:.*\]/m,(m)=>{
    const cur=m.replace(/^\[ti:\s*/,'').replace(/\]$/,'').trim();
    return(cur===''||cur.toLowerCase()==='unknown')?`[ti: ${stem}]`:m;
  });
  if(updated!==getTA()){_setTA(updated);updateTitleFromText();}
  doAutosave(pathHint||file.name.replace(/\.[^.]+$/,'').toLowerCase());
}
function onTimeUpdate(){
  const pos=audioEl.currentTime,dur=audioEl.duration||0;
  document.getElementById('time-pos').textContent=fmtTime(pos);
  document.getElementById('progress-fill').style.width=dur?(pos/dur*100)+'%':'0%';
  updateActiveLineFromTime(pos*1000);
}
let suppressAutoLine=false;
function updateActiveLineFromTime(posMs){
  if(suppressAutoLine)return;
  const lines=getTA().split('\n');let best=-1;
  for(let i=0;i<lines.length;i++){const ms=tsToMs(lines[i]);if(ms!==null&&ms<=posMs)best=i;}
  if(best===-1)return;
  if(best===activeLine)return;
  const activeHasTs=activeLine>=0&&tsToMs(lines[activeLine])!==null;
  if(!activeHasTs&&activeLine>best)return;
  activeLine=best;renderMainLines();scrollToActive();syncSecScroll();
}
function fmtTime(s){s=Math.floor(s);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
let lastPlayingLine=-1;
function togglePlay(){
  if(!audioEl)return;
  if(playing){audioEl.pause();playing=false;updatePlayBtn();return;}
  const lineMs=activeLine>=0?tsToMs(getTA().split('\n')[activeLine]):null;
  const isCurrentLine=activeLine===lastPlayingLine;
  if(isCurrentLine){
    if(cfg.replay_resume_current&&lineMs!==null){audioEl.currentTime=Math.max(0,lineMs+getSeekOffset())/1000;}
  }else{
    if(cfg.replay_play_other&&lineMs!==null){audioEl.currentTime=Math.max(0,lineMs+getSeekOffset())/1000;}
    else if(lineMs!==null){audioEl.currentTime=lineMs/1000;}
  }
  try{audioEl.muted=masterMuted;audioEl.volume=masterVolume;}catch(_){}
  audioEl.play();playing=true;lastPlayingLine=activeLine;updatePlayBtn();
}
function updatePlayBtn(){
  const pi=document.getElementById('media-play-icon'),pai=document.getElementById('media-pause-icon');
  if(pi)pi.style.display=playing?'none':'';
  if(pai)pai.style.display=playing?'':'none';
  rebuildHkPanel();
}
function currentMs(){return audioEl?audioEl.currentTime*1000:0;}
function firstLyricLine(){const lines=getTA().split('\n');for(let i=0;i<lines.length;i++){if(!META_RE.test(lines[i])&&lines[i].trim()!=='')return i;}return -1;}
function lastLyricLine(){const lines=getTA().split('\n');for(let i=lines.length-1;i>=0;i--){if(!META_RE.test(lines[i])&&lines[i].trim()!=='')return i;}return -1;}
function seekPrevLine(){
  if(activeLine>=0&&activeLine===firstLyricLine())return;
  const lines=getTA().split('\n');
  for(let i=activeLine-1;i>=0;i--){
    if(META_RE.test(lines[i])||lines[i].trim()==='')continue;
    const ms=tsToMs(lines[i]);
    activeLine=i;suppressAutoLine=true;
    clearTimeout(arrowNavTimer);arrowNavTimer=setTimeout(()=>{suppressAutoLine=false;},1500);
    if(ms!==null&&cfg.replay_prev_line){
      audioEl&&(audioEl.currentTime=Math.max(0,ms+getSeekOffset())/1000);
      if(audioEl&&!playing){audioEl.play();playing=true;lastPlayingLine=i;updatePlayBtn();}
    }
    renderMainLines();scrollToActive();return;
  }
}
function seekNextLine(){
  if(activeLine>=0&&activeLine===lastLyricLine())return;
  const lines=getTA().split('\n');
  for(let i=activeLine+1;i<lines.length;i++){
    if(META_RE.test(lines[i])||lines[i].trim()==='')continue;
    const ms=tsToMs(lines[i]);
    activeLine=i;suppressAutoLine=true;
    clearTimeout(arrowNavTimer);arrowNavTimer=setTimeout(()=>{suppressAutoLine=false;},1500);
    if(ms!==null&&cfg.replay_next_line){
      audioEl&&(audioEl.currentTime=Math.max(0,ms+getSeekOffset())/1000);
      if(audioEl&&!playing){audioEl.play();playing=true;lastPlayingLine=i;updatePlayBtn();}
    }
    renderMainLines();scrollToActive();return;
  }
}
function replayActiveLine(seekEnd){
  if(activeLine<0||!audioEl)return;
  const lines=getTA().split('\n');
  let ms=tsToMs(lines[activeLine]);
  if(seekEnd){
    for(let i=activeLine+1;i<lines.length;i++){const nm=tsToMs(lines[i]);if(nm!==null){ms=nm;break;}}
  }
  if(ms!==null){
    audioEl.currentTime=Math.max(0,ms+getSeekOffset())/1000;
    if(!playing){audioEl.play();playing=true;updatePlayBtn();}
  }
}
function doSeekBack(){
  if(!audioEl)return;
  const inc=cfg.seek_increment_s||5;
  audioEl.currentTime=Math.max(0,audioEl.currentTime-inc);
}
function doSeekFwd(){
  if(!audioEl)return;
  const inc=cfg.seek_increment_s||5;
  audioEl.currentTime=Math.min(audioEl.duration||0,audioEl.currentTime+inc);
}

(()=>{

function tickSeekOffset(delta){

// ── Sync / timestamp ─────────────────────────────────────────────────────────
function syncLine(){
  const ms=currentMs(),lines=getTA().split('\n');
  if(activeLine<0||activeLine>=lines.length)return;
  lines[activeLine]=replaceTs(lines[activeLine],ms);setMainText(lines.join('\n'));
  if(cfg.replay_after_sync){
    replayActiveLine(false);
  }else{
    const allLines=getTA().split('\n');
    let next=activeLine+1;
    while(next<allLines.length&&(META_RE.test(allLines[next])||allLines[next].trim()===''))next++;
    if(next<allLines.length){
      activeLine=next;suppressAutoLine=true;
      clearTimeout(arrowNavTimer);
      arrowNavTimer=setTimeout(()=>{suppressAutoLine=false;},1500);
      renderMainLines();scrollToActive();
    }
  }
}
function insertEndLine(){
  const ms=currentMs(),lines=getTA().split('\n');
  const idx=activeLine>=0?activeLine+1:lines.length;
  lines.splice(idx,0,msToTs(ms));setMainText(lines.join('\n'));
  activeLine=idx;renderMainLines();scrollToActive();
}
function adjustTs(delta){
  const lines=getTA().split('\n');
  const targets=selectedLines.size>0?[...selectedLines]:[activeLine];
  let changed=false;
  targets.forEach(i=>{
    if(i<0||i>=lines.length)return;
    const ms=tsToMs(lines[i]);if(ms===null)return;
    lines[i]=replaceTs(lines[i],ms+delta);changed=true;
  });
  if(!changed)return;
  setMainText(lines.join('\n'));
  if(cfg.replay_after_ts){replayActiveLine(false);}
}
function markAsTranslation(){
  if(!hasTrailingTimestamp())return;
  const lines=getTA().split('\n');
  let targets;
  if(!hotkeyMode){
    // Typing mode: use cursor line
    const ta=document.getElementById('main-textarea');
    const pos=ta.selectionStart;
    const before=ta.value.slice(0,pos);
    const lineIdx=before.split('\n').length-1;
    targets=[lineIdx];
  }else{
    // Hotkey mode: only the active line, regardless of multi-selection
    targets=activeLine>=0?[activeLine]:[];
  }
  const useParens=document.getElementById('main-paren-check').checked;
  let changed=false;
  targets.forEach(i=>{
    if(i<0||i>=lines.length)return;
    if(META_RE.test(lines[i]))return;
    // Find next timestamped line
    let nextMs=null;
    for(let j=i+1;j<lines.length;j++){
      const ms=tsToMs(lines[j]);
      if(ms!==null){nextMs=ms;break;}
    }
    if(nextMs===null)return;
    const offsetMs=nextMs-10;
    // Extract content (strip existing timestamp if present)
    const content=TS_RE.test(lines[i])?lines[i].slice(10).replace(/^ /,''):lines[i];
    let newContent=content;
    if(useParens&&newContent.trim()&&!newContent.trim().startsWith('(')){
      newContent='('+newContent.trim()+')';
    }
    lines[i]=msToTs(offsetMs)+(newContent?' '+newContent:'');
    changed=true;
  });
  if(changed){setMainText(lines.join('\n'));pushSnapshot();}
}

// ── Line counts / merge ──────────────────────────────────────────────────────
function getMainLyricLines(){return getTA().split('\n').filter(l=>l.trim()&&!META_RE.test(l)&&!isEndTs(l));}
function _updateFieldBorders(){
  const area=document.getElementById('editor-area');
  const cols=Array.from(area.querySelectorAll('.field-col')).filter(c=>c.style.display!=='none');
  area.querySelectorAll('.field-col').forEach(c=>c.style.borderRight='');
  if(cols.length)cols[cols.length-1].style.borderRight='none';
}
function hasTrailingTimestamp(){
  const lines=getTA().split('\n');
  // Find the last non-empty non-meta line
  for(let i=lines.length-1;i>=0;i--){
    const l=lines[i];
    if(l.trim()===''||META_RE.test(l))continue;
    return isEndTs(l);
  }
  return false;
}
function checkLineCounts(){
  _updateFieldBorders();
  const n=getMainLyricLines().length;
  // Trailing timestamp warning in main field
  const mainWarn=document.getElementById('main-warn');
  const hasTs=getTA().split('\n').some(l=>tsToMs(l)!==null);
  if(hasTs&&!hasTrailingTimestamp()){mainWarn.textContent='⚠ Missing trailing timestamp';mainWarn.classList.add('visible');}
  else{mainWarn.textContent='';mainWarn.classList.remove('visible');}
  if(secondaryCols.length===0&&mergeDone){mergeDone=false;}
  const missingTrailing=hasTs&&!hasTrailingTimestamp();
  secondaryCols.forEach(({linesEl,warnBar})=>{
    const sn=getSecLines(linesEl).length;
    if(sn&&sn!==n){warnBar.textContent=`\u26a0 Line count mismatch (${sn} vs ${n})`;warnBar.classList.add('visible');}
    else if(missingTrailing){warnBar.textContent='\u26a0 Missing trailing timestamp in Main';warnBar.classList.add('visible');}
    else warnBar.classList.remove('visible');
  });
}
function updateMergeBtn(){
  document.getElementById('btn-remove-sec').disabled=secondaryCols.length===0;
  if(mergeDone){document.getElementById('merge-btn').disabled=true;return;}
  const n=getMainLyricLines().length;
  const ok=secondaryCols.some(c=>getSecLines(c.linesEl).length>0)&&
    secondaryCols.every(c=>{const sn=getSecLines(c.linesEl).length;return sn===0||sn===n;});
  document.getElementById('merge-btn').disabled=!ok;
}
function mergeTranslations(){
  const mainLines=getTA().split('\n');
  const tsLines=mainLines.map((l,i)=>[i,tsToMs(l)]).filter(([,ms])=>ms!==null);
  if(!tsLines.length){alert('No timestamps in main field.');return;}
  const secData=secondaryCols.map(({linesEl})=>({lines:getSecLines(linesEl)})).filter(d=>d.lines.length>0);
  if(!secData.length)return;
  const lastLine=mainLines[tsLines[tsLines.length-1][0]];
  if(!isEndTs(lastLine)&&!confirm('No trailing end timestamp found. Final secondary lines may not display correctly. Continue?'))return;
  const contentTs=tsLines.filter(([i])=>!isEndTs(mainLines[i]));
  const result=[...mainLines];
  for(let ci=contentTs.length-1;ci>=0;ci--){
    const[lineIdx]=contentTs[ci];
    let nextMs=null;for(const[i,ms]of tsLines){if(i>lineIdx){nextMs=ms;break;}}
    if(nextMs===null)continue;
    const ins=[];
    secData.forEach(({lines})=>{if(ci<lines.length)ins.push(lines[ci]);});
    const n=ins.length;
    result.splice(lineIdx+1,0,...ins.map((t,j)=>`${msToTs(nextMs-(n-j)*10)} ${t}`));
  }
  pushSnapshot();
  _setTA(result.join('\n'));renderMainLines();checkLineCounts();updateTitleFromText();doAutosave();
  pushSnapshot();
  document.getElementById('merge-btn').disabled=true;
  mergeDone=true;
}

// ── Import ───────────────────────────────────────────────────────────────────
function stemOf(n){return n.replace(/\.[^.]+$/,'');}
function stemOfLower(n){return n.replace(/\.[^.]+$/,'').toLowerCase();}
function doImport(){document.getElementById('file-picker').value='';document.getElementById('file-picker').click();}
function doSave(){
  // Build filename from [ti:] tag or fallback
  const text=getTA();
  const tiMatch=text.match(/^\[ti:\s*(.+)\]/m);
  const ti=tiMatch?tiMatch[1].trim():'';
  let stem='lyrics';
  if(ti&&ti.toLowerCase()!=='unknown')stem=ti;
  else if(lastImportStem)stem=lastImportStem;
  // Sanitise filename
  stem=stem.replace(/[/\\:*?"<>|]/g,'_');
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=stem+'.lrc';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

let currentSpeed=1.0;
function changeSpeed(dir){
  if(dir===0){currentSpeed=1.0;}

    const ratio=cfg.speed_ratio||1.10;
    currentSpeed=dir>0?Math.min(4,+(currentSpeed*ratio).toFixed(4)):Math.max(0.1,+(currentSpeed/ratio).toFixed(4));

}
const HOTKEY_ONLY=new Set(['play_pause','play_pause_alt','sync','end_line','prev_line','next_line','replay_only',
  'ts_back_tiny','ts_fwd_tiny','ts_back_small','ts_fwd_small',
  'ts_back_medium','ts_fwd_medium','ts_back_large','ts_fwd_large',
  'sync_file']);
function rebuildHkPanel(){
  const grid=document.getElementById('hk-grid');grid.innerHTML='';
  const hk=cfg.hotkeys,{tiny_ms:tn,small_ms:sm,medium_ms:med,large_ms:lg}=cfg;
  const om=offsetSeekMode;
  const tsLabel=om?'seek':'time';
  const modeRow=document.createElement('div');
  modeRow.style.cssText='grid-column:span 2;display:grid;grid-template-columns:1fr 1fr;gap:3.3px;';
  [{key:'offset_mode_toggle',label:offsetSeekMode?'Offset seek':'Offset time',warn:offsetSeekMode},
   {key:'toggle_mode',label:hotkeyMode?'Hotkey mode':'Typing mode',warn:!hotkeyMode}
  ].forEach(({key,label,warn})=>{
    const cell=document.createElement('div');
    cell.className='hk-cell mode half';
    if(warn){cell.style.background='var(--warn-bg)';cell.style.borderColor='var(--warn-border)';cell.style.color='var(--warn-text)';}
    cell.title=HK_LABELS[key]||label;
    cell.innerHTML=`<span>${label}</span><span class="hk-key" style="${warn?'background:rgba(212,167,44,0.15);color:var(--warn-text)':''}">${hk[key]==='Escape'?'Esc':(hk[key]||'—')}</span>`;
    cell.addEventListener('click',()=>CTRL_ACTIONS[key]&&CTRL_ACTIONS[key]());
    modeRow.appendChild(cell);
  });
  grid.appendChild(modeRow);
  [['play_pause','Play/pause'],['sync','Sync line'],
   ['prev_line','Previous line'],['next_line','Next line'],
   ['replay_only','Replay only'],['end_line','End line'],
   ['ts_back_tiny',`\u2212${tn}ms ${tsLabel}`],['ts_fwd_tiny',`+${tn}ms ${tsLabel}`],
   ['ts_back_small',`\u2212${sm}ms ${tsLabel}`],['ts_fwd_small',`+${sm}ms ${tsLabel}`],
   ['ts_back_medium',`\u2212${med}ms ${tsLabel}`],['ts_fwd_medium',`+${med}ms ${tsLabel}`],
   ['ts_back_large',`\u2212${lg}ms ${tsLabel}`],['ts_fwd_large',`+${lg}ms ${tsLabel}`],
  ].forEach(([key,label])=>{
    const cell=document.createElement('div');cell.className='hk-cell';
    cell.title=HK_LABELS[key]||label;
    const dimmed=!hotkeyMode&&HOTKEY_ONLY.has(key);
    if(dimmed)cell.style.opacity='0.35';
    if(key==='sync'){
      const replayKey=hk.replay_line||'Enter';
      cell.innerHTML=`<span>${label}</span><span style="display:flex;gap:3px"><span class="hk-key">${hk[key]||'—'}</span><span class="hk-key">${replayKey==='Escape'?'Esc':replayKey}</span></span>`;
    }else{
      cell.innerHTML=`<span>${label}</span><span class="hk-key">${hk[key]==='Escape'?'Esc':(hk[key]||'—')}</span>`;
    }
    cell.addEventListener('click',()=>{if(!dimmed&&CTRL_ACTIONS[key])CTRL_ACTIONS[key]();});
    grid.appendChild(cell);
  });
  const sfBtn=document.getElementById('sync-file-btn');
  sfBtn.querySelectorAll('.hk-key').forEach(n=>n.remove());
  const sfKey=hk.sync_file||'';
  if(sfKey){const badge=document.createElement('span');badge.className='hk-key';badge.textContent=sfKey;sfBtn.appendChild(badge);}
}

  document.getElementById('s-replay-resume').checked=cfg.replay_resume_current;

  document.getElementById('s-replay-ts').checked=cfg.replay_after_ts;
  document.getElementById('s-tiny').value=cfg.tiny_ms;
  document.getElementById('s-small').value=cfg.small_ms;
  document.getElementById('s-medium').value=cfg.medium_ms;
  document.getElementById('s-large').value=cfg.large_ms;
  document.getElementById('s-seek-inc').value=cfg.seek_increment_s??5;

// ── Settings search ───────────────────────────────────────────────────────────
let _sSearchHkMode=false;// true = hotkey capture mode in search bar

function applySettingsFilter(){
  const raw=document.getElementById('s-search').value.trim();
  const body=document.getElementById('settings-body');
  if(!raw){
    // Show everything
    body.querySelectorAll('.s-hidden').forEach(el=>el.classList.remove('s-hidden'));
    body.querySelectorAll('.s-sub-label').forEach(el=>el.classList.remove('s-all-hidden'));
    return;
  }
  if(_sSearchHkMode){
    // Hotkey mode: raw is a captured key string — find rows whose cfg hotkey matches
    body.querySelectorAll('[data-hk-key]').forEach(inp=>{
      const key=inp.dataset.hkKey;
      const stored=cfg.hotkeys[key]||'';
      const row=inp.closest('.hk-row');
      if(!row)return;
      row.classList.toggle('s-hidden',stored!==raw&&stored!==(raw==='Esc'?'Escape':raw));
    });
    // Hide all non-hotkey sections
    body.querySelectorAll('.s-sec-label,.s-check,.s-row,.s-meta').forEach(el=>{
      if(!el.closest('#hk-settings-rows'))el.classList.add('s-hidden');
    });
    // Hide sub-labels with no visible rows
    body.querySelectorAll('.s-sub-label').forEach(sub=>{
      let sib=sub.nextElementSibling;let hasVisible=false;
      while(sib&&!sib.classList.contains('s-sub-label')&&!sib.classList.contains('s-sec-label')){
        if(!sib.classList.contains('s-hidden'))hasVisible=true;
        sib=sib.nextElementSibling;
      }
      sub.classList.toggle('s-hidden',!hasVisible);
    });
  }else{
    // Text mode: match setting labels, section names, sub-labels, checkbox text
    const q=raw.toLowerCase();
    // First pass: show/hide individual rows
    body.querySelectorAll('.s-check,.s-row,.hk-row').forEach(row=>{
      const text=row.textContent.toLowerCase();
      row.classList.toggle('s-hidden',!text.includes(q));
    });
    // Show/hide textarea rows (default meta)
    body.querySelectorAll('.s-meta').forEach(ta=>{
      const parent=ta.closest('div');if(parent)parent.classList.toggle('s-hidden',!'default metadata tags'.includes(q));
    });
    // Show/hide section labels — show if label matches OR any child is visible
    body.querySelectorAll('.s-sec-label').forEach(sec=>{
      const secText=sec.textContent.toLowerCase();
      let sib=sec.nextElementSibling;let hasVisible=false;
      while(sib&&!sib.classList.contains('s-sec-label')){
        if(!sib.classList.contains('s-hidden')&&!sib.classList.contains('s-sub-label'))hasVisible=true;
        sib=sib.nextElementSibling;
      }
      sec.classList.toggle('s-hidden',!hasVisible&&!secText.includes(q));
    });
    // Sub-labels: show if any sibling hk-row is visible
    body.querySelectorAll('.s-sub-label').forEach(sub=>{
      let sib=sub.nextElementSibling;let hasVisible=false;
      while(sib&&!sib.classList.contains('s-sub-label')&&!sib.classList.contains('s-sec-label')){
        if(!sib.classList.contains('s-hidden'))hasVisible=true;
        sib=sib.nextElementSibling;
      }
      sub.classList.toggle('s-hidden',!hasVisible);
    });
  }
}

function setSearchHkMode(on){
  _sSearchHkMode=on;
  const inp=document.getElementById('s-search');
  const btn=document.getElementById('s-search-kbd');
  if(on){
    inp.classList.add('hk-mode');
    inp.value='';
    inp.placeholder='Press a key…';
    btn.classList.add('active');
  }else{
    inp.classList.remove('hk-mode');
    inp.placeholder='Search…';
    btn.classList.remove('active');
    applySettingsFilter();
  }
}

function initSettingsSearch(){
  const inp=document.getElementById('s-search');
  const btn=document.getElementById('s-search-kbd');
  inp.value='';_sSearchHkMode=false;
  inp.classList.remove('hk-mode');btn.classList.remove('active');
  inp.placeholder='Search…';

  btn.onclick=()=>{setSearchHkMode(!_sSearchHkMode);inp.focus();};

  inp.oninput=()=>{if(!_sSearchHkMode)applySettingsFilter();};

  inp.onkeydown=e=>{
    if(_sSearchHkMode){
      e.preventDefault();e.stopPropagation();
      // Backspace/Delete/Escape all reset search mode without assigning
      if(e.key==='Escape'||e.key==='Backspace'||e.key==='Delete'){
        setSearchHkMode(false);inp.value='';applySettingsFilter();return;
      }
      // Build key string
      const parts=[];
      if(e.ctrlKey)parts.push('Ctrl');if(e.shiftKey)parts.push('Shift');if(e.altKey)parts.push('Alt');
      const k=e.key;
      if(['Control','Shift','Alt','Meta'].includes(k))return;
      const disp=k==='Escape'?'Esc':k===' '?'Space':k.length===1?k.toUpperCase():k;
      parts.push(disp);
      const ks=parts.join('+');
      // Ignore keys that are globally restricted AND not assigned to any hotkey
      // (i.e. they can never appear as a hotkey, so searching for them is meaningless)
      const isAssigned=Object.values(cfg.hotkeys).some(v=>v===ks||(ks==='Esc'&&v==='Escape'));
      const isGloballyRestricted=!!isRestrictedForAll(ks);
      if(isGloballyRestricted&&!isAssigned)return;
      inp.value=ks;
      applySettingsFilter();
    }else{
      e.stopPropagation();
      // Toggle hotkey search mode with the toggle_mode hotkey key
      const ks=keyStr(e);
      if(hkMatch(ks,cfg.hotkeys.toggle_mode)){e.preventDefault();setSearchHkMode(true);return;}
      if(e.key==='Escape'){
        e.preventDefault();
        if(inp.value){inp.value='';applySettingsFilter();}
        else{closeSettings();}
      }
    }
  };
}

function buildHkRows(){
  const c=document.getElementById('hk-settings-rows');c.innerHTML='';
  setConflict('');

  HK_SECTIONS.forEach(({label,keys})=>{
    const subHdr=document.createElement('div');
    subHdr.className='s-sub-label';subHdr.textContent=label;
    c.appendChild(subHdr);

    keys.forEach(key=>{
      const labelText=HK_LABELS[key]||key;
      const def=DEFAULT_CFG.hotkeys[key]||'';
      const row=document.createElement('div');row.className='hk-row';

      // Clear button (circular, left of label)
      const clrBtn=document.createElement('button');
      clrBtn.className='hk-clear';clrBtn.title='Clear (Backspace / Delete)';clrBtn.textContent='✕';

      const lbl=document.createElement('label');lbl.textContent=labelText;

      const inp=document.createElement('input');inp.className='hk-capture';inp.dataset.hkKey=key;
      const stored=cfg.hotkeys[key]||'';
      inp.value=stored==='Escape'?'Esc':stored;
      inp.readOnly=true;

      const rep=document.createElement('button');rep.className='hk-replace';rep.textContent='Replace';
      const rst=document.createElement('button');rst.className='hk-reset';rst.textContent='↺ Default';
      const restrictWarn=document.createElement('span');restrictWarn.className='hk-restrict-warn';

      let _conflictKey='';
      let _lastGoodVal=inp.value;// track last accepted value for revert
      let _skipBlurRevert=false;// prevent blur from overwriting after clear/restriction
      // Clear button: only visible while field shows '…' (focused/awaiting input)
      // Default button: visible whenever current cfg value differs from default
      function updateClear(){clrBtn.classList.toggle('visible',inp.value==='…');}
      const updateRst=()=>{
        const live=cfg.hotkeys[key]||'';
        // Show Default if value differs from default, OR restriction warning showing, OR conflict pending
        rst.classList.toggle('visible',live!==def||restrictWarn.classList.contains('visible')||!!_conflictKey);
      };
      updateClear();updateRst();

      function revertAndExit(){
        // Fully reset all conflict/replace UI, revert display to last good value, exit capture
        _skipBlurRevert=true;
        inp.value=_lastGoodVal;
        setConflict('');
        rep.classList.remove('visible');row.classList.remove('hk-conflict');_conflictKey='';
        updateClear();updateRst();
        inp.blur();
        _skipBlurRevert=false;
      }

      function clearHotkey(){
        _skipBlurRevert=true;
        inp.value='';
        cfg.hotkeys[key]='';
        _lastGoodVal='';
        saveCfg();setConflict('');
        rep.classList.remove('visible');row.classList.remove('hk-conflict');_conflictKey='';
        restrictWarn.classList.remove('visible');
        updateClear();updateRst();
        rebuildHkPanel();updateDynamicTooltips();
        inp.blur();
        _skipBlurRevert=false;
      }

      clrBtn.addEventListener('mousedown',e=>{e.preventDefault();_skipBlurRevert=true;});// prevent inp blur from reverting before click fires
      clrBtn.addEventListener('click',e=>{e.preventDefault();clearHotkey();});

      rep.addEventListener('click',()=>{
        if(!_conflictKey)return;
        cfg.hotkeys[_conflictKey]='';
        cfg.hotkeys[key]=inp.value==='Esc'?'Escape':inp.value;
        saveCfg();setConflict('');buildHkRows();rebuildHkPanel();updateDynamicTooltips();
      });
      rst.addEventListener('click',()=>{
        const defDisp=def==='Escape'?'Esc':def;
        cfg.hotkeys[key]=def;_lastGoodVal=defDisp;
        saveCfg();setConflict('');rebuildHkPanel();updateDynamicTooltips();
        inp.value=defDisp;
        rep.classList.remove('visible');row.classList.remove('hk-conflict');_conflictKey='';
        restrictWarn.classList.remove('visible');
        updateClear();updateRst();
      });

      let _prevVal='';
      inp.addEventListener('focus',()=>{
        _prevVal=_lastGoodVal;
        inp.value='…';
        setConflict('');
        rep.classList.remove('visible');row.classList.remove('hk-conflict');_conflictKey='';
        restrictWarn.classList.remove('visible');// clear warning on new attempt
        updateClear();
      });
      inp.addEventListener('blur',()=>{
        if(_skipBlurRevert)return;
        if(inp.value==='…')inp.value=_prevVal;
        updateClear();updateRst();
      });
      inp.addEventListener('keydown',e=>{
        e.preventDefault();e.stopPropagation();
        // Backspace / Delete = clear; Escape = cancel
        if(e.key==='Backspace'||e.key==='Delete'){clearHotkey();return;}
        if(e.key==='Escape'){revertAndExit();return;}

        const parts=[];
        if(e.ctrlKey)parts.push('Ctrl');if(e.shiftKey)parts.push('Shift');if(e.altKey)parts.push('Alt');
        const k=e.key;
        // Reject modifier-only keystrokes (no actual key beyond the modifier itself)
        if(['Control','Shift','Alt','Meta'].includes(k))return;
        const disp=k==='Escape'?'Esc':k===' '?'Space':k.length===1?k.toUpperCase():k;
        parts.push(disp);
        if(!parts.length)return;
        const newVal=parts.join('+');
        const newStored=newVal==='Esc'?'Escape':newVal;

        // Check restriction — fully exit capture on rejection
        const restrictMsg=isRestrictedForKey(newStored,key);
        if(restrictMsg){
          restrictWarn.textContent=`⚠ ${restrictMsg}`;
          restrictWarn.classList.add('visible');
          updateRst();// show Default button now that warning is visible
          // Warning stays until Default is clicked; revert display and exit capture
          revertAndExit();
          return;
        }
        restrictWarn.classList.remove('visible');
        inp.value=newVal;

        // Conflict check
        const conflict=Object.entries(cfg.hotkeys).find(([k2,v])=>k2!==key&&v===newStored);
        if(conflict){
          const conflictLabel=HK_LABELS[conflict[0]]||conflict[0];
          setConflict(`⚠ Used by "${conflictLabel}"`);
          rep.classList.add('visible');_conflictKey=conflict[0];
          row.classList.add('hk-conflict');
          updateClear();updateRst();
        }else{
          setConflict('');rep.classList.remove('visible');row.classList.remove('hk-conflict');_conflictKey='';
          cfg.hotkeys[key]=newStored;
          _lastGoodVal=newVal;
          saveCfg();rebuildHkPanel();updateDynamicTooltips();updateClear();updateRst();
          inp.blur();
        }
      });

      // Layout: [label] [capture] [clear] [replace] [reset] [restrictWarn]
      row.appendChild(lbl);row.appendChild(inp);row.appendChild(clrBtn);row.appendChild(rep);row.appendChild(rst);row.appendChild(restrictWarn);
      c.appendChild(row);
    });
  });
}

// ── Keyboard ─────────────────────────────────────────────────────────────────
  // ── Key normalization ──────────────────────────────────────────────────────
function keyStr(e){
  const p=[];if(e.ctrlKey)p.push('Ctrl');if(e.shiftKey)p.push('Shift');if(e.altKey)p.push('Alt');
  const k=e.key;if(!['Control','Shift','Alt','Meta'].includes(k))p.push(k===' '?'Space':k.length===1?k.toUpperCase():k);
  return p.join('+');
}
function hkMatch(ks,stored){return ks===stored||(stored==='Escape'&&ks==='Escape');}

  // ── Main textarea keydown (autocomplete / bracket logic) ───────────────────
document.getElementById('main-textarea').addEventListener('keydown',e=>{
  if(!hotkeyMode&&e.key==='Enter'){
    const ta=e.target,pos=ta.selectionStart;
    const v=ta.value;
    const lineStart=v.lastIndexOf('\n',pos-1)+1;
    const curLine=v.slice(lineStart,pos);
    const trimmed=curLine.trimEnd();
    if(trimmed.length<curLine.length){
      e.preventDefault();
      ta.value=v.slice(0,lineStart)+trimmed+'\n'+v.slice(pos);
      ta.setSelectionRange(lineStart+trimmed.length+1,lineStart+trimmed.length+1);
      ta.dispatchEvent(new Event('input'));
    }
  }
  if(!hotkeyMode&&(e.key==='('||e.key==='[')){
    const close=e.key==='('?')':']';
    const ta=e.target,start=ta.selectionStart,end=ta.selectionEnd;
    if(start!==end){
      // Wrap selected text
      e.preventDefault();
      const v=ta.value;
      ta.value=v.slice(0,start)+e.key+v.slice(start,end)+close+v.slice(end);
      ta.setSelectionRange(start+1,end+1);
      ta.dispatchEvent(new Event('input'));
    }else if(e.key==='('){
      // Auto-close ( at end of line if ( is placed at the start of a lyric line's content
      const v=ta.value;
      const lineStart=v.lastIndexOf('\n',start-1)+1;
      const lineEnd=v.indexOf('\n',start);
      const lineText=v.slice(lineStart,lineEnd<0?v.length:lineEnd);
      const afterTs=TS_RE.test(lineText)?lineText.slice(10).replace(/^ /,''):lineText;
      const posInContent=start-(lineStart+(TS_RE.test(lineText)?11:0));
      if(posInContent<=0&&!META_RE.test(lineText)){
        // At start of lyric content — insert ( and ) around rest of line
        e.preventDefault();
        const restEnd=lineEnd<0?v.length:lineEnd;
        const rest=v.slice(start,restEnd).trimEnd();
        ta.value=v.slice(0,start)+'('+rest+')'+(lineEnd<0?'':v.slice(lineEnd));
        ta.setSelectionRange(start+1,start+1);
        ta.dispatchEvent(new Event('input'));
      }else{
        // Normal position — just insert ( and )
        e.preventDefault();
        ta.value=v.slice(0,start)+'()'+v.slice(end);
        ta.setSelectionRange(start+1,start+1);
        ta.dispatchEvent(new Event('input'));
      }
    }else{
      // [ — just insert with auto-close
      e.preventDefault();
      const v=ta.value;
      ta.value=v.slice(0,start)+e.key+close+v.slice(end);
      ta.setSelectionRange(start+1,start+1);
      ta.dispatchEvent(new Event('input'));
    }
  }
});

  // ── Overlay utilities ──────────────────────────────────────────────────────
let arrowNavTimer=null;
  // ── Global keydown handler ────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const settingsOpen=document.getElementById('settings-overlay').classList.contains('open');
  const ks=keyStr(e),hk=cfg.hotkeys;
  // When settings is open, Tab always goes to search field (prevents tabbing to background)
  if(settingsOpen&&e.key==='Tab'&&!e.ctrlKey&&!e.altKey){
    const sf=document.getElementById('s-search');
    if(document.activeElement!==sf){e.preventDefault();sf.focus();return;}
  }
  if(hkMatch(ks,hk.settings)){e.preventDefault();if(settingsOpen)closeSettings();else openSettings();return;}
  if(hk.help&&hkMatch(ks,hk.help)){e.preventDefault();openHelp();return;}
  if(hk.issues&&hkMatch(ks,hk.issues)){e.preventDefault();window.open('https://github.com/amokprime/linebyline/issues','_blank');return;}
  if(hk.theme_toggle&&hkMatch(ks,hk.theme_toggle)){e.preventDefault();cycleTheme();return;}
  // Close settings on Escape — not if a hotkey capture field is focused
  if(e.key==='Escape'&&settingsOpen){
    const focused=document.activeElement;
    const isCapture=focused&&focused.classList.contains('hk-capture');
    if(isCapture)return;
    if(focused!==document.getElementById('s-search')){e.preventDefault();closeSettings();}
    return;
  }
  if(settingsOpen)return;

  if(hk.open&&hkMatch(ks,hk.open)){e.preventDefault();doImport();return;}
  if(hk.save&&hkMatch(ks,hk.save)){e.preventDefault();doSave();return;}
  if(hkMatch(ks,hk.undo)){e.preventDefault();doUndo();return;}
  if(hkMatch(ks,hk.redo)){e.preventDefault();doRedo();return;}
  if(hkMatch(ks,hk.add_field)){e.preventDefault();addSecondary();return;}
  if(hkMatch(ks,hk.remove_field)){e.preventDefault();removeSecondary();return;}
  if(hkMatch(ks,hk.merge_fields)){e.preventDefault();mergeTranslations();return;}
  if(hk.mark_translation&&hkMatch(ks,hk.mark_translation)){e.preventDefault();markAsTranslation();return;}
  if(hkMatch(ks,hk.speed_down)){e.preventDefault();changeSpeed(-1);return;}
  if(hkMatch(ks,hk.speed_up)){e.preventDefault();changeSpeed(1);return;}
  if(hkMatch(ks,hk.speed_reset)){e.preventDefault();changeSpeed(0);return;}
  if(hkMatch(ks,hk.seek_back)){e.preventDefault();doSeekBack();return;}
  if(hkMatch(ks,hk.seek_fwd)){e.preventDefault();doSeekFwd();return;}
  if(hk.play_pause_alt&&hkMatch(ks,hk.play_pause_alt)){e.preventDefault();togglePlay();return;}
  // Ctrl+M: hardcoded mute (mirrors browser tab mute)
  if(ks==='Ctrl+M'){e.preventDefault();masterMuted=!masterMuted;applyVolume();return;}
  if(hkMatch(ks,hk.toggle_mode)){e.preventDefault();hotkeyMode=!hotkeyMode;applyMode();return;}
  if(hkMatch(ks,hk.offset_mode_toggle)){e.preventDefault();setOffsetMode(!offsetSeekMode);return;}
  if(hkMatch(ks,hk.sync_file)){e.preventDefault();doSyncFile();return;}
  if(!hotkeyMode)return;

  if(e.key==='Escape'||hkMatch(ks,hk.clear_sel)){e.preventDefault();selectedLines.clear();renderMainLines();return;}

  const allLines=getTA().split('\n');
  const lineCount=allLines.length;
  if(e.key==='Home'||e.key==='End'){
    e.preventDefault();
    const nonMeta=allLines.map((l,i)=>({l,i})).filter(({l})=>!META_RE.test(l)&&l.trim()!=='');
    if(nonMeta.length){
      activeLine=e.key==='Home'?nonMeta[0].i:nonMeta[nonMeta.length-1].i;
      selectedLines.clear();renderMainLines();scrollToActive();
    }
    return;
  }
  if(e.key==='PageUp'||e.key==='PageDown'){
    e.preventDefault();
    const scroll=document.getElementById('main-scroll');
    const lineH=scroll.scrollHeight/Math.max(1,allLines.filter(l=>!META_RE.test(l)).length);
    const pageLines=Math.max(1,Math.floor(scroll.clientHeight/lineH)-1);
    const nonMeta=allLines.map((l,i)=>({l,i})).filter(({l})=>!META_RE.test(l)&&l.trim()!=='');
    if(!nonMeta.length)return;
    const curPos=nonMeta.findIndex(({i})=>i===activeLine);
    const base=curPos<0?(e.key==='PageUp'?nonMeta.length-1:0):curPos;
    const targetPos=e.key==='PageUp'?Math.max(0,base-pageLines):Math.min(nonMeta.length-1,base+pageLines);
    activeLine=nonMeta[targetPos].i;
    selectedLines.clear();renderMainLines();scrollToActive();return;
  }
  if(e.key==='ArrowUp'||e.key==='ArrowDown'){
    e.preventDefault();
    const isUp=e.key==='ArrowUp';
    if(!e.shiftKey&&!e.ctrlKey){
      if(isUp&&activeLine>=0&&activeLine===firstLyricLine())return;
      if(!isUp&&activeLine>=0&&activeLine===lastLyricLine())return;
    }
    suppressAutoLine=true;clearTimeout(arrowNavTimer);arrowNavTimer=setTimeout(()=>{suppressAutoLine=false;},1500);
    const dir=isUp?-1:1;
    let next=activeLine<0?0:activeLine;
    let candidate=next+dir;
    while(candidate>=0&&candidate<lineCount){
      if(!META_RE.test(allLines[candidate])&&allLines[candidate].trim()!=='')break;
      candidate+=dir;
    }
    if(candidate<0||candidate>=lineCount||META_RE.test(allLines[candidate])||allLines[candidate].trim()==='')candidate=next;
    next=Math.max(0,Math.min(lineCount-1,candidate));
    if(e.shiftKey){if(selectedLines.size===0&&activeLine>=0)selectedLines.add(activeLine);selectedLines.add(next);activeLine=next;}
    else if(e.ctrlKey){activeLine=next;}
    else{selectedLines.clear();activeLine=next;}
    renderMainLines();scrollToActive();return;
  }

  if(hkMatch(ks,hk.replay_line)&&activeLine>=0){e.preventDefault();syncLine();return;}
  if(hkMatch(ks,hk.replay_only)&&activeLine>=0){e.preventDefault();replayActiveLine(false);return;}
  if(hk.replay_end&&hkMatch(ks,hk.replay_end)&&activeLine>=0){e.preventDefault();replayActiveLine(true);return;}
  if(e.shiftKey&&e.key==='Enter'&&activeLine>=0){e.preventDefault();replayActiveLine(true);return;}
  if(e.shiftKey&&hkMatch('Space',hk.play_pause)&&e.key===' '){e.preventDefault();replayActiveLine(true);return;}

  // Hardcoded ArrowLeft/Right = seek back/forward in Hotkey mode (not remappable, not shown in Settings)
  if(e.key==='ArrowLeft'){e.preventDefault();doSeekBack();return;}
  if(e.key==='ArrowRight'){e.preventDefault();doSeekFwd();return;}

  const actions={
    [hk.play_pause]:()=>togglePlay(),
    [hk.sync]:()=>syncLine(),
    [hk.end_line]:()=>insertEndLine(),
    [hk.prev_line]:()=>seekPrevLine(),
    [hk.next_line]:()=>seekNextLine(),
    [hk.ts_back_tiny]:()=>CTRL_ACTIONS.ts_back_tiny(),
    [hk.ts_fwd_tiny]:()=>CTRL_ACTIONS.ts_fwd_tiny(),
    [hk.ts_back_small]:()=>CTRL_ACTIONS.ts_back_small(),
    [hk.ts_fwd_small]:()=>CTRL_ACTIONS.ts_fwd_small(),
    [hk.ts_back_medium]:()=>CTRL_ACTIONS.ts_back_medium(),
    [hk.ts_fwd_medium]:()=>CTRL_ACTIONS.ts_fwd_medium(),
    [hk.ts_back_large]:()=>CTRL_ACTIONS.ts_back_large(),
    [hk.ts_fwd_large]:()=>CTRL_ACTIONS.ts_fwd_large(),
  };
  if(actions[ks]){e.preventDefault();actions[ks]();}
});

// ── Unload warning ────────────────────────────────────────────────────────────
window.addEventListener('beforeunload',e=>{
  const hasContent=getTA().trim()!==cfg.default_meta.trim()&&getTA().trim()!=='';
  if(hasContent){e.preventDefault();e.returnValue='Progress will not be saved. Are you sure?';}
});

// ── Button wiring ─────────────────────────────────────────────────────────────
document.getElementById('btn-undo').addEventListener('click',doUndo);
document.getElementById('btn-redo').addEventListener('click',doRedo);
document.getElementById('btn-seek-back').addEventListener('click',doSeekBack);
document.getElementById('btn-seek-fwd').addEventListener('click',doSeekFwd);
document.getElementById('btn-play-pause').addEventListener('click',togglePlay);
document.getElementById('btn-add-sec').addEventListener('click',addSecondary);
document.getElementById('btn-remove-sec').addEventListener('click',removeSecondary);
document.getElementById('merge-btn').addEventListener('click',mergeTranslations);
document.getElementById('btn-theme').addEventListener('click',cycleTheme);
document.getElementById('vol-mute-btn').addEventListener('click',()=>{masterMuted=!masterMuted;applyVolume();});
document.getElementById('font-select').addEventListener('change',e=>{editorFont=e.target.value;saveEditorFont();});
document.getElementById('font-size-inp').addEventListener('change',e=>{editorSize=Math.max(8,Math.min(32,parseFloat(e.target.value)||14));saveEditorFont();});
document.getElementById('font-size-inp').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();editorSize=Math.max(8,Math.min(32,parseFloat(e.target.value)||14));saveEditorFont();e.target.blur();}});
document.getElementById('fs-up').addEventListener('click',()=>{editorSize=Math.min(32,editorSize+1);saveEditorFont();});
document.getElementById('fs-down').addEventListener('click',()=>{editorSize=Math.max(8,editorSize-1);saveEditorFont();});

sessionStorage.removeItem('lbl_autosave');
applyTheme();
applyEditorFont();
loadAutosave();
updateMergeBtn();
document.getElementById('seek-offset').value=cfg.seek_offset;
document.getElementById('vol-slider').step=cfg.vol_increment||0.1;
applyVolume();
rebuildHkPanel();applyMode();
updateDynamicTooltips();
</script>
